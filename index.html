<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal & Claude Code Drills</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
    padding: 20px;
  }
  #app { width: 100%; max-width: 720px; }
  .terminal {
    background: #0d1117; border-radius: 12px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .terminal-bar {
    background: #161b22; padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #21262d;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }
  .terminal-title {
    color: #8b949e; font-size: 13px; margin-left: 8px; flex: 1; text-align: center;
  }
  .terminal-body {
    padding: 20px; min-height: 420px; max-height: 70vh; overflow-y: auto;
  }
  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .line { color: #c9d1d9; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .line.dim { color: #484f58; }
  .line.green { color: #3fb950; }
  .line.red { color: #f85149; }
  .line.yellow { color: #d29922; }
  .line.bold { font-weight: 700; }
  .line.heading { color: #58a6ff; font-weight: 700; font-size: 15px; padding: 6px 0; }
  .format-tag {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 3px; margin-left: 8px; vertical-align: middle;
  }
  .format-tag.type { background: #238636; color: #fff; }
  .format-tag.choice { background: #58a6ff; color: #0d1117; }
  .format-tag.tf { background: #bc8cff; color: #0d1117; }
  .format-tag.reverse { background: #d29922; color: #0d1117; }
  .input-row { display: flex; align-items: center; margin-top: 8px; padding: 2px 0; }
  .prompt-symbol { color: #3fb950; font-weight: 700; margin-right: 8px; font-size: 14px; user-select: none; }
  #input {
    flex: 1; background: none; border: none; color: #f0f6fc;
    font-family: inherit; font-size: 14px; outline: none; caret-color: #58a6ff;
  }
  #input::placeholder { color: #30363d; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
  .choice-btn {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 12px; color: #c9d1d9; font-family: inherit; font-size: 13px;
    cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .choice-btn:hover { background: #1c2333; border-color: #58a6ff; color: #f0f6fc; }
  .choice-btn.correct { background: #0f2d16; border-color: #3fb950; color: #3fb950; }
  .choice-btn.wrong { background: #2d0f0f; border-color: #f85149; color: #f85149; }
  .choice-btn.reveal { border-color: #3fb950; color: #3fb950; opacity: 0.7; }
  .choice-btn .choice-key {
    display: inline-block; width: 22px; height: 22px; border-radius: 4px;
    background: #21262d; color: #8b949e; text-align: center; line-height: 22px;
    font-size: 11px; font-weight: 700; margin-right: 8px;
  }
  .choice-btn.correct .choice-key { background: #238636; color: #fff; }
  .choice-btn.wrong .choice-key { background: #da3633; color: #fff; }
  .tf-statement {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 16px; margin: 12px 0; font-size: 14px; color: #f0f6fc; line-height: 1.6;
  }
  .tf-statement .tf-cmd { color: #3fb950; font-weight: 700; }
  .tf-statement .tf-arrow { color: #484f58; margin: 0 8px; }
  .tf-buttons { display: flex; gap: 10px; margin: 8px 0; }
  .tf-btn {
    flex: 1; padding: 14px; border-radius: 8px; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: 2px solid;
  }
  .tf-btn.true-btn { background: #0f2d16; border-color: #238636; color: #3fb950; }
  .tf-btn.true-btn:hover { background: #163b22; }
  .tf-btn.false-btn { background: #2d0f0f; border-color: #da3633; color: #f85149; }
  .tf-btn.false-btn:hover { background: #3b1616; }
  .tf-btn.selected { opacity: 1; transform: scale(1.02); }
  .tf-btn.dimmed { opacity: 0.3; pointer-events: none; }
  .reverse-cmd {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 14px 16px; margin: 10px 0; font-size: 16px; text-align: center;
  }
  .reverse-cmd code { color: #3fb950; font-weight: 700; font-size: 18px; }
  .score-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px; background: #161b22;
    border-top: 1px solid #21262d; font-size: 13px; color: #8b949e;
  }
  .score-bar .score { color: #3fb950; font-weight: 700; }
  .score-bar .streak { color: #d29922; }
  .progress { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; max-width: 50%; justify-content: center; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: #21262d; transition: background 0.3s; }
  .pip.correct { background: #3fb950; }
  .pip.wrong { background: #f85149; }
  .pip.retry { background: #d29922; }
  .pip.current { background: #58a6ff; box-shadow: 0 0 6px #58a6ff; }
  .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
  .cat-btn {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 14px 12px; color: #c9d1d9; font-family: inherit; font-size: 13px;
    cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .cat-btn:hover { background: #1c2333; border-color: #58a6ff; color: #f0f6fc; }
  .cat-btn .cat-num { color: #58a6ff; font-weight: 700; margin-right: 6px; }
  .cat-btn .cat-desc { display: block; color: #484f58; font-size: 11px; margin-top: 4px; }
  .result-card {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 20px; margin: 12px 0; text-align: center;
  }
  .result-card .big-score { font-size: 48px; font-weight: 700; }
  .result-card .pct { font-size: 20px; color: #8b949e; margin-top: 4px; }
  .result-card .msg { margin-top: 12px; color: #8b949e; font-size: 14px; }
  .review-list {
    text-align: left; margin: 12px 0; padding: 12px;
    background: #0d1117; border-radius: 6px; border: 1px solid #21262d;
  }
  .review-item { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #161b22; }
  .review-item:last-child { border: none; }
  .review-item .q { color: #8b949e; }
  .review-item .a { color: #3fb950; font-weight: 600; }
  .btn {
    background: #238636; border: 1px solid #2ea043; color: #fff;
    font-family: inherit; font-size: 14px; padding: 10px 24px;
    border-radius: 6px; cursor: pointer; margin: 4px; transition: background 0.15s;
  }
  .btn:hover { background: #2ea043; }
  .btn.secondary { background: #21262d; border-color: #30363d; }
  .btn.secondary:hover { background: #30363d; }
  .btn.drill-more { background: #6e40c9; border-color: #8957e5; }
  .btn.drill-more:hover { background: #8957e5; }
  .hint-btn {
    background: none; border: 1px solid #30363d; color: #484f58;
    font-family: inherit; font-size: 11px; padding: 2px 8px;
    border-radius: 4px; cursor: pointer;
  }
  .hint-btn:hover { color: #8b949e; border-color: #484f58; }
  .hint-text { color: #d29922; font-size: 12px; margin-top: 4px; font-style: italic; }
  .explain {
    background: #161b22; border: 1px solid #21262d; border-radius: 6px;
    padding: 10px 12px; margin: 8px 0; font-size: 13px; color: #8b949e; line-height: 1.6;
  }
  .explain strong { color: #58a6ff; font-weight: 600; }
  .explain .when { color: #d29922; display: block; margin-top: 6px; font-style: italic; }
  .retry-badge {
    display: inline-block; background: #d29922; color: #0d1117;
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-left: 8px;
  }
  .action-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }

  /* Progress bars on category cards */
  .cat-progress { margin-top: 8px; }
  .cat-progress-bar {
    height: 4px; border-radius: 2px; background: #21262d; overflow: hidden; margin-top: 4px;
  }
  .cat-progress-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
  .cat-progress-fill.low { background: #f85149; }
  .cat-progress-fill.mid { background: #d29922; }
  .cat-progress-fill.high { background: #3fb950; }
  .cat-progress-text { font-size: 10px; color: #484f58; display: flex; justify-content: space-between; }
  .cat-progress-text .best { color: #3fb950; }

  /* Size picker */
  .size-picker { margin: 16px 0; }
  .size-picker-title { color: #8b949e; font-size: 13px; margin-bottom: 10px; }
  .size-btns { display: flex; gap: 8px; }
  .size-btn {
    flex: 1; background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 16px 12px; color: #c9d1d9; font-family: inherit; font-size: 14px;
    cursor: pointer; text-align: center; transition: all 0.15s;
  }
  .size-btn:hover { background: #1c2333; border-color: #58a6ff; color: #f0f6fc; }
  .size-btn .size-num { display: block; font-size: 24px; font-weight: 700; color: #58a6ff; }
  .size-btn .size-label { display: block; font-size: 11px; color: #484f58; margin-top: 4px; }

  /* Stats bar on menu */
  .stats-bar {
    display: flex; gap: 16px; margin: 12px 0; padding: 10px 14px;
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    font-size: 12px; color: #484f58; justify-content: center; flex-wrap: wrap;
  }
  .stat-item { text-align: center; }
  .stat-value { color: #f0f6fc; font-weight: 700; font-size: 16px; display: block; }
  .stat-label { margin-top: 2px; }
  .stat-value.streak-val { color: #d29922; }

  /* Difficulty selector */
  .diff-btns { display: flex; gap: 8px; margin: 10px 0 16px; }
  .diff-btn {
    flex: 1; padding: 10px 8px; border-radius: 8px; font-family: inherit;
    font-size: 13px; cursor: pointer; text-align: center; transition: all 0.15s;
    border: 2px solid #21262d; background: #161b22; color: #8b949e;
  }
  .diff-btn:hover { border-color: #30363d; color: #c9d1d9; }
  .diff-btn.active { color: #f0f6fc; }
  .diff-btn.active.beginner { border-color: #3fb950; background: #0f2d16; }
  .diff-btn.active.intermediate { border-color: #58a6ff; background: #0d1f3c; }
  .diff-btn.active.advanced { border-color: #f85149; background: #2d0f0f; }
  .diff-btn .diff-icon { font-size: 18px; display: block; margin-bottom: 4px; }
  .diff-btn .diff-label { font-weight: 700; display: block; }
  .diff-btn .diff-desc { font-size: 10px; color: #484f58; display: block; margin-top: 2px; }
  .diff-btn.active .diff-desc { color: #8b949e; }

  .back-btn {
    background: none; border: none; color: #484f58; font-family: inherit;
    font-size: 12px; cursor: pointer; padding: 4px 0; margin-bottom: 8px;
  }
  .back-btn:hover { color: #8b949e; }

  /* Learn mode / flashcards */
  .flashcard {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 14px 16px; margin: 8px 0; cursor: pointer; transition: all 0.15s;
  }
  .flashcard:hover { border-color: #30363d; }
  .flashcard .fc-q { color: #c9d1d9; font-size: 13px; line-height: 1.5; }
  .flashcard .fc-a {
    display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #21262d;
  }
  .flashcard.open .fc-a { display: block; }
  .flashcard .fc-cmd { color: #3fb950; font-weight: 700; font-size: 15px; }
  .flashcard .fc-explain { color: #8b949e; font-size: 12px; margin-top: 6px; line-height: 1.5; }
  .flashcard .fc-explain strong { color: #58a6ff; }
  .flashcard .fc-explain .when { color: #d29922; display: block; margin-top: 4px; font-style: italic; }
  .flashcard .fc-tap { color: #30363d; font-size: 11px; float: right; }
  .flashcard.open .fc-tap { display: none; }
  .learn-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .learn-count { color: #484f58; font-size: 12px; }

  @media (max-width: 500px) {
    .categories { grid-template-columns: 1fr; }
    .choices { grid-template-columns: 1fr; }
    .terminal-body { padding: 14px; min-height: 350px; }
  }

  /* Keyboard hints */
  .kb-hint { color: #484f58; font-size: 11px; margin-top: 6px; }
  .kb-hint kbd { background: #21262d; border: 1px solid #30363d; border-radius: 3px; padding: 1px 5px; font-family: inherit; font-size: 10px; color: #8b949e; }

  /* Sandbox */
  .sb-line { font-size: 13px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .sb-line.cmd { color: #3fb950; }
  .sb-line.out { color: #c9d1d9; }
  .sb-line.err { color: #f85149; }
  .sb-line.muted { color: #484f58; }
  .sb-line.yellow { color: #d29922; }
  .sb-line.blue { color: #58a6ff; }
  #sb-input { flex: 1; background: none; border: none; color: #f0f6fc; font-family: inherit; font-size: 13px; outline: none; caret-color: #58a6ff; }
  .sb-prompt { color: #3fb950; font-weight: 700; margin-right: 6px; font-size: 13px; user-select: none; white-space: nowrap; }
  .sb-input-row { display: flex; align-items: center; margin-top: 6px; border-top: 1px solid #21262d; padding-top: 6px; }
</style>
</head>
<body>
<div id="app">
  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <div class="terminal-title">Terminal Drills — noat@mac</div>
    </div>
    <div class="terminal-body" id="body"></div>
    <div class="score-bar" id="scorebar" style="display:none">
      <div>Score: <span class="score" id="scoreNum">0/0</span></div>
      <div class="progress" id="pips"></div>
      <div class="streak" id="streakText"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  QUESTION BANK
//  Every explain now includes a <span class="when"> with a real-life scenario
// ═══════════════════════════════════════════

const DRILLS = {
  workflow: {
    title: "Daily Workflow",
    desc: "Real scenarios with Claude Code",
    questions: [
      { q: "You just opened Terminal. How do you start Claude Code?", best: "claude", desc: "Launches Claude Code in the current folder", accept: s => has(s,"claude"), hint: "Just the name of the tool.", explain: "<strong>claude</strong> — starts a new session in your current folder.<span class='when'>Use this: every time you open Terminal and want to start working with Claude.</span>" },
      { q: "You want to open Claude Code in your 'website' project folder", best: "cd website && claude", desc: "Navigate to project folder then start Claude", accept: s => has(s,"cd") && has(s,"claude"), hint: "First go there, then start Claude.", explain: "<strong>cd website</strong> then <strong>claude</strong> (or chain them: <strong>cd website && claude</strong>). Claude works on whatever folder you're in.<span class='when'>Use this: when you have multiple projects and need Claude to focus on a specific one.</span>" },
      { q: "You open your laptop to continue yesterday's work with Claude. How?", best: "claude --continue", desc: "Resume the previous Claude Code conversation", accept: s => hasAny(s,["/resume","/continue","--continue","-c","resume","continue"]), hint: "There's a flag you can add when starting Claude, or a slash command once inside.", explain: "From Terminal: <strong>claude --continue</strong> (or <strong>claude -c</strong>). Already inside Claude: type <strong>/resume</strong>.<span class='when'>Use this: every morning when you want to pick up exactly where you left off.</span>" },
      { q: "Claude asks permission to edit a file. You want to let it. What do you press?", best: "y or Enter", desc: "Approve Claude's file edit request", accept: s => hasAny(s,["y","yes","enter","approve","accept","allow"]), hint: "The simplest key for 'yes'.", explain: "Press <strong>y</strong> or <strong>Enter</strong> to approve. You can also press <strong>n</strong> to deny.<span class='when'>Use this: every time Claude wants to edit, create, or delete a file — you're the gatekeeper.</span>" },
      { q: "You want Claude to make changes without asking permission every time", best: "Shift+Tab", desc: "Switch to a more permissive mode", accept: s => hasAny(s,["shift+tab","shift tab","auto","accept","bypass"]), hint: "There's a keyboard shortcut to cycle through permission modes.", explain: "<strong>Shift+Tab</strong> cycles through modes: default → acceptEdits → plan → auto. Each is more permissive.<span class='when'>Use this: when you trust Claude on a task and the permission prompts are slowing you down.</span>" },
      { q: "Claude made changes you don't like. How do you see exactly what changed?", best: "/diff", desc: "Review all file changes Claude made", accept: s => has(s,"/diff") || has(s,"diff"), hint: "Short for 'difference'.", explain: "<strong>/diff</strong> — shows every change: green = added, red = removed.<span class='when'>Use this: ALWAYS after Claude edits files, before you move on. Get in the habit of reviewing.</span>" },
      { q: "Claude edited a file and you want to UNDO those changes", best: "Tell Claude 'undo' or git checkout", desc: "Revert Claude's changes to a file", accept: s => hasAny(s,["undo","revert","checkout","restore","tell claude","ask claude"]), hint: "You can either ask Claude to fix it, or use a git command.", explain: "Easiest: just tell Claude <strong>'undo those changes'</strong>. Or use <strong>git checkout filename</strong> to restore the last saved version.<span class='when'>Use this: when Claude changed something and it broke, or you changed your mind.</span>" },
      { q: "Claude's response is getting really long and you don't need it. Stop it.", best: "Ctrl+C", desc: "Cancel Claude's current response", accept: s => hasAll(s,["ctrl","c"]) || hasAll(s,["control","c"]), hint: "The universal stop button.", explain: "<strong>Ctrl+C</strong> — stops Claude immediately. Your conversation is safe.<span class='when'>Use this: when Claude is going down a wrong path or generating more than you need.</span>" },
      { q: "You want Claude to look at a specific file. How do you mention it?", best: "@filename", desc: "Reference a file using @ autocomplete", accept: s => has(s,"@"), hint: "Like tagging someone on social media.", explain: "<strong>@filename</strong> — autocompletes as you type. Claude will read the file.<span class='when'>Use this: when you want Claude to look at, analyze, or modify a specific file.</span>" },
      { q: "You want Claude to plan first, not start changing things right away", best: "/plan", desc: "Switch to plan mode before executing", accept: s => hasAny(s,["/plan","plan mode","shift+tab","shift tab"]), hint: "There's a mode where Claude thinks but doesn't act.", explain: "<strong>/plan</strong> or <strong>Shift+Tab</strong> to cycle to plan mode.<span class='when'>Use this: when a task is complex and you want to review Claude's approach before it starts editing.</span>" },
      { q: "The conversation is getting long and Claude seems confused. What do you do?", best: "/clear", desc: "Clear the conversation to reset Claude's context", accept: s => hasAny(s,["/clear","/reset","/new","clear","start fresh","new"]), hint: "Sometimes the best fix is a clean slate.", explain: "<strong>/clear</strong> — starts a fresh conversation. Your files aren't affected.<span class='when'>Use this: when Claude keeps misunderstanding you, or you're switching to a completely different task.</span>" },
      { q: "You want to switch to a different project. What's the simplest way?", best: "Ctrl+D, cd to folder, claude", desc: "Exit, navigate, and restart Claude in the new folder", accept: s => (has(s,"exit") || has(s,"ctrl") || has(s,"quit") || has(s,"close")) && (has(s,"cd") || has(s,"folder") || has(s,"navigate")), hint: "You need to leave Claude, go to the new folder, and start fresh.", explain: "<strong>Ctrl+D</strong> to exit, <strong>cd ~/other-project</strong>, then <strong>claude</strong>.<span class='when'>Use this: when you're done with one project and want to switch to another. Claude always works on the folder you started it in.</span>" },
      { q: "You want to save the work Claude did before closing", best: "git add . && git commit", desc: "Save your work with git before ending the session", accept: s => (has(s,"git") && has(s,"commit")) || has(s,"ask claude") || has(s,"tell claude"), hint: "Use git to take a snapshot, or just ask Claude to do it.", explain: "Run <strong>git add . && git commit -m 'save progress'</strong> — or just tell Claude <strong>'commit my changes'</strong>.<span class='when'>Use this: before closing Terminal or ending your session, so nothing is lost.</span>" },
      { q: "Claude is done but you're not sure what it actually changed. What do you check?", best: "/diff", desc: "Review what Claude changed in your files", accept: s => has(s,"/diff") || has(s,"diff"), hint: "A slash command that shows the before and after.", explain: "<strong>/diff</strong> — shows every file Claude touched, with green (added) and red (removed) lines.<span class='when'>Use this: after every task Claude completes. It's the best way to verify Claude did what you expected.</span>" },
      { q: "Someone sent you a GitHub link to a project. How do you download it and start working?", best: "git clone, cd, claude", desc: "Clone the repo, enter it, start Claude", accept: s => has(s,"git") && has(s,"clone"), hint: "Three steps: download it, enter the folder, start Claude.", explain: "<strong>git clone URL</strong>, then <strong>cd project-name</strong>, then <strong>claude</strong>.<span class='when'>Use this: the first time you work on someone else's project from GitHub.</span>" },
      { q: "You made a mistake in what you told Claude. How do you take it back?", best: "Ctrl+C, then retype", desc: "Cancel and re-instruct Claude", accept: s => hasAll(s,["ctrl","c"]) || hasAll(s,["control","c"]) || hasAny(s,["stop","cancel","undo"]), hint: "Stop what's happening, then try again with better instructions.", explain: "<strong>Ctrl+C</strong> to stop Claude, then type your corrected instruction.<span class='when'>Use this: when you realize mid-generation that you asked for the wrong thing.</span>" },
    ]
  },
  navigation: {
    title: "Where Am I?",
    desc: "Navigation basics",
    questions: [

//  HELPERS

function norm(s) { return s.toLowerCase().replace(/['"]/g,"").replace(/\s+/g," ").trim(); }
function has(input, word) { return norm(input).includes(norm(word)); }
function hasAny(input, words) { return words.some(w => has(input, w)); }
function hasAll(input, words) { return words.every(w => has(input, w)); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getAllQuestions() {
  let all = [];
  Object.entries(DRILLS).forEach(([cat, d]) => {
    d.questions.forEach((q, i) => all.push({ ...q, id: cat+"_"+i, cat }));
  });
  return all;
}

function getDistractors(item, count) {
  const all = getAllQuestions().filter(q => q.id !== item.id && q.best !== item.best);
  return shuffle(all).slice(0, count).map(q => q.best);
}

function getDescDistractors(item, count) {
  const all = getAllQuestions().filter(q => q.id !== item.id && q.desc !== item.desc);
  return shuffle(all).slice(0, count).map(q => q.desc);
}

function pickFormat(item) {
  const r = Math.random();
  const diff = state.difficulty || "intermediate";

  if (diff === "beginner") {
    // Mostly recognition: 15% type, 50% choice, 35% reverse
    if (r < 0.15) return "type";
    if (r < 0.65) return "choice";
    return "reverse";
  }
  if (diff === "advanced") {
    // Mostly recall: 75% type, 10% choice, 15% reverse
    if (r < 0.75) return "type";
    if (r < 0.85) return "choice";
    return "reverse";
  }
  // Intermediate (default)
  if (r < 0.35) return "type";
  if (r < 0.70) return "choice";
  return "reverse";
}

//  PROGRESS TRACKING (localStorage)
// ═══════════════════════════════════════════

const STORAGE_KEY = "terminal_drills_progress";

function loadProgress() {
  try {
    const data = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (data && data.version === 2) return data;
  } catch(e) {}
  return {
    version: 2,
    totalDrills: 0,
    totalQuestions: 0,
    totalCorrect: 0,
    dayStreak: 0,
    lastPlayedDate: null,
    categories: {},
    questionStats: {}
  };
}

function saveProgress(catKey, score, total) {
  const p = loadProgress();
  const today = new Date().toISOString().slice(0, 10);

  p.totalDrills++;
  p.totalQuestions += total;
  p.totalCorrect += score;

  // Day streak
  if (p.lastPlayedDate === today) {
    // already played today, streak stays
  } else {
    const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
    p.dayStreak = (p.lastPlayedDate === yesterday) ? p.dayStreak + 1 : 1;
  }
  p.lastPlayedDate = today;

  // Category stats
  if (catKey) {
    const pct = Math.round(score / total * 100);
    if (!p.categories[catKey]) p.categories[catKey] = { bestPct: 0, timesPlayed: 0, lastPct: 0 };
    const c = p.categories[catKey];
    c.timesPlayed++;
    c.lastPct = pct;
    if (pct > c.bestPct) c.bestPct = pct;
  }

  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function saveQuestionResult(id, correct) {
  const p = loadProgress();
  if (!p.questionStats) p.questionStats = {};
  if (!p.questionStats[id]) p.questionStats[id] = { seen: 0, correct: 0 };
  p.questionStats[id].seen++;
  if (correct) p.questionStats[id].correct++;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(p));
}

function getQuestionWeight(q) {
  const p = loadProgress();
  const stats = p.questionStats && p.questionStats[q.id];
  if (!stats || stats.seen === 0) return 4;
  const acc = stats.correct / stats.seen;
  if (acc >= 1) return 1;
  if (acc >= 0.75) return 2;
  if (acc >= 0.5) return 3;
  return 5;
}

function weightedSample(arr, count) {
  const pool = arr.map(q => ({ q, w: getQuestionWeight(q) }));
  const result = [];
  while (result.length < count && pool.length > 0) {
    const total = pool.reduce((s, x) => s + x.w, 0);
    let r = Math.random() * total;
    for (let i = 0; i < pool.length; i++) {
      r -= pool[i].w;
      if (r <= 0) { result.push(pool[i].q); pool.splice(i, 1); break; }
    }
  }
  return result;
}

  initDrill(sorted.slice(0, 5));
}

        <span class="cat-desc">Practice commands in a fake terminal</span>
      </button>
    </div>
    <div style="text-align:center;margin-top:12px">
      <button class="back-btn" onclick="showHowToPlay()" style="font-size:12px">? How to play</button>
    </div>`;

  render(html);
}

// ── Size picker ──

function showSizePicker(catKey) {
  state.catKey = catKey;
  state.difficulty = state.difficulty || "intermediate";
  scorebar.style.display = "none";

  const isMixed = catKey === "mixed";
  const d = isMixed ? null : DRILLS[catKey];
  const maxQ = isMixed ? getAllQuestions().length : d.questions.length;
  const title = isMixed ? "Mixed Drill" : d.title;

  const quickN = Math.min(5, maxQ);
  const standardN = Math.min(10, maxQ);
  const fullN = maxQ;

  let html = `
    <button class="back-btn" onclick="showMenu()">← Back to categories</button>
    <div class="line bold heading">${title}</div>`;

  // Learn first button (not for mixed)
  if (!isMixed) {
    html += `<button class="btn secondary" onclick="showLearn('${catKey}')" style="margin-bottom:12px;width:100%;text-align:center;">📖 Learn first — browse all commands</button>`;
  }

  // Difficulty selector
  const diff = state.difficulty;
  html += `
    <div class="size-picker-title">Difficulty</div>
    <div class="diff-btns">
      <button class="diff-btn beginner ${diff==='beginner'?'active':''}" onclick="setDifficulty('beginner','${catKey}')">
        <span class="diff-label">Beginner</span>
        <span class="diff-desc">Multiple choice. Hints shown.</span>
      </button>
      <button class="diff-btn intermediate ${diff==='intermediate'?'active':''}" onclick="setDifficulty('intermediate','${catKey}')">
        <span class="diff-label">Intermediate</span>
        <span class="diff-desc">Mixed formats. Hints on click.</span>
      </button>
      <button class="diff-btn advanced ${diff==='advanced'?'active':''}" onclick="setDifficulty('advanced','${catKey}')">
        <span class="diff-label">Advanced</span>
        <span class="diff-desc">Type from memory. No hints.</span>
      </button>
    </div>`;

  html += `
    <div class="size-picker">
      <div class="size-picker-title">How many questions?</div>
      <div class="size-btns">
        <button class="size-btn" onclick="launchDrill('${catKey}', ${quickN})">
          <span class="size-num">${quickN}</span>
          <span class="size-label">Quick</span>
        </button>
        <button class="size-btn" onclick="launchDrill('${catKey}', ${standardN})">
          <span class="size-num">${standardN}</span>
          <span class="size-label">Standard</span>
        </button>
        <button class="size-btn" onclick="launchDrill('${catKey}', ${fullN})">
          <span class="size-num">${fullN}</span>
          <span class="size-label">Full</span>
        </button>
      </div>
    </div>`;

  render(html);
}

function setDifficulty(level, catKey) {
  state.difficulty = level;
  showSizePicker(catKey);
}

// ── Learn mode (flashcards) ──

function showLearn(catKey) {
  scorebar.style.display = "none";
  const d = DRILLS[catKey];

  let html = `
    <button class="back-btn" onclick="showSizePicker('${catKey}')">← Back</button>
    <div class="learn-header">
      <div class="line bold heading">${d.title}</div>
      <div><span class="learn-count">${d.questions.length} commands</span> <button class="hint-btn" onclick="toggleAllCards()" id="reveal-toggle">Reveal all</button></div>
    </div>
    <div class="line dim" style="margin-bottom:12px">Tap any card to reveal the answer. Browse them all, then go practice.</div>
  `;

  d.questions.forEach((q, i) => {
    html += `
      <div class="flashcard" onclick="this.classList.toggle('open')">
        <div class="fc-q">${q.q}<span class="fc-tap">tap to reveal</span></div>
        <div class="fc-a">
          <div class="fc-cmd">${q.best}</div>
          <div class="fc-explain">${q.explain}</div>
        </div>
      </div>`;
  });

  html += `
    <div style="text-align:center;margin:16px 0">
      <button class="btn" onclick="showSizePicker('${catKey}')">Ready to practice →</button>
    </div>`;

  render(html);
  scrollBottom();
}

function toggleAllCards() {
  const cards = document.querySelectorAll(".flashcard");
  const btn = document.getElementById("reveal-toggle");
  const allOpen = [...cards].every(c => c.classList.contains("open"));
  cards.forEach(c => { if (allOpen) c.classList.remove("open"); else c.classList.add("open"); });
  btn.textContent = allOpen ? "Reveal all" : "Hide all";
}

function launchDrill(catKey, count) {
  state.catKey = catKey;
  let questions;
  if (catKey === "mixed") {
    questions = weightedSample(getAllQuestions(), count);
  } else {
    questions = weightedSample(DRILLS[catKey].questions.map((q, i) => ({ ...q, id: catKey+"_"+i, cat: catKey })), count);
  }
  initDrill(questions);
}

function initDrill(questions) {
  state.queue = questions.map(q => ({ ...q, format: pickFormat(q), isRetry: false }));
  state.originalCount = questions.length;
  state.current = 0;
  state.answered = 0;
  state.firstTryCorrect = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.history = [];
  state.wrongMap = new Map();
  state.waitingForUser = false;
  showQuestion();
}

function showQuestion() {
  if (state.waitingForUser) return;
  const item = state.queue[state.current];
  const remaining = state.queue.length - state.current;

  scorebar.style.display = "flex";
  document.getElementById("scoreNum").textContent = `${state.firstTryCorrect}/${state.answered}`;
  document.getElementById("streakText").textContent = state.streak > 1 ? `Streak: ${state.streak}` : "";
  updatePips();

  const retryLabel = item.isRetry ? `<span class="retry-badge">RETRY</span>` : "";
  const fmtLabels = { type: "TYPE IT", choice: "PICK ONE", tf: "TRUE / FALSE", reverse: "WHAT DOES IT DO?" };
  const fmtClass = { type: "type", choice: "choice", tf: "tf", reverse: "reverse" };

  let html = `<div class="line dim">Question ${state.history.length + 1}${retryLabel} <span class="format-tag ${fmtClass[item.format]}">${fmtLabels[item.format]}</span></div>`;

  if (item.format === "type") html += renderType(item);
  else if (item.format === "choice") html += renderChoice(item);
  else if (item.format === "tf") html += renderTF(item);
  else html += renderReverse(item);

  render(html);
  const input = document.getElementById("input");
  if (input) { input.focus(); input.addEventListener("keydown", e => { if (e.key === "Enter") submitType(); }); }
  scrollBottom();
}

function renderType(item) {
  return `
    <div class="line heading" style="margin:8px 0 12px">${item.q}</div>
    ${getHintHtml()}
    <div id="feedback-area"></div>
    <div class="input-row"><span class="prompt-symbol">$</span>
      <input type="text" id="input" placeholder="type your answer..." autocomplete="off" autofocus spellcheck="false">
    </div><div id="action-area"></div>`;
}

function submitType() {
  const input = document.getElementById("input");
  if (!input || input.disabled) return;
  const val = input.value.trim();
  if (!val) return;
  input.disabled = true; input.style.opacity = 0.5;
  const item = state.queue[state.current];
  const correct = item.accept(val);
  const wrongContext = !correct ? `<div class="line dim" style="font-size:12px;margin-top:6px">You typed: <strong style="color:#f85149">${val}</strong></div>` : "";
  handleResult(correct, item, wrongContext);
}

function renderChoice(item) {
  const options = shuffle([item.best, ...getDistractors(item, 3)]);
  state._choiceAnswer = item.best;
  state._choiceOptions = options;
  const keys = ["A","B","C","D"];
  let c = `<div class="choices" id="choices">`;
  options.forEach((opt, i) => {
    c += `<button class="choice-btn" data-idx="${i}" onclick="submitChoice(${i})"><span class="choice-key">${keys[i]}</span>${opt}</button>`;
  });
  return `<div class="line heading" style="margin:8px 0 12px">${item.q}</div>
    ${getHintHtml()}
    ${c}</div><div class="kb-hint" style="margin-top:4px">Press <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> to pick</div><div id="feedback-area"></div><div id="action-area"></div>`;
}

function submitChoice(idx) {
  const btns = document.querySelectorAll(".choice-btn");
  if ([...btns].some(b => b.classList.contains("correct") || b.classList.contains("wrong"))) return;
  const picked = state._choiceOptions[idx];
  const correct = picked === state._choiceAnswer;
  btns.forEach((btn, i) => {
    btn.style.pointerEvents = "none";
    if (i === idx) btn.classList.add(correct ? "correct" : "wrong");
    if (!correct && state._choiceOptions[i] === state._choiceAnswer) btn.classList.add("reveal");
  });
  // If wrong, find what the picked answer actually does
  let wrongContext = "";
  if (!correct) {
    const pickedQ = getAllQuestions().find(q => q.best === picked);
    if (pickedQ) wrongContext = `<div class="line dim" style="font-size:12px;margin-top:6px">What <strong style="color:#f85149">${picked}</strong> actually does: ${pickedQ.desc}</div>`;
  }
  handleResult(correct, state.queue[state.current], wrongContext);
}

function renderTF(item) {
  const isTrue = Math.random() < 0.5;
  const shownDesc = isTrue ? item.desc : pick(getAllQuestions().filter(q => q.id !== item.id && q.desc !== item.desc)).desc;
  state._tfCorrectAnswer = isTrue;
  return `<div class="line heading" style="margin:8px 0 8px">Is this statement correct?</div>
    <div class="tf-statement"><span class="tf-cmd">${item.best}</span><span class="tf-arrow">→</span>${shownDesc}</div>
    ${getHintHtml()}
    <div class="tf-buttons" id="tf-buttons">
      <button class="tf-btn true-btn" onclick="submitTF(true)">TRUE</button>
      <button class="tf-btn false-btn" onclick="submitTF(false)">FALSE</button>
    </div><div class="kb-hint" style="margin-top:4px">Press <kbd>T</kbd> for True, <kbd>F</kbd> for False</div><div id="feedback-area"></div><div id="action-area"></div>`;
}

function submitTF(answer) {
  const btns = document.querySelectorAll(".tf-btn");
  if ([...btns].some(b => b.classList.contains("dimmed"))) return;
  const correct = answer === state._tfCorrectAnswer;
  btns.forEach(btn => {
    btn.style.pointerEvents = "none";
    const isSelected = (btn.classList.contains("true-btn") && answer) || (btn.classList.contains("false-btn") && !answer);
    btn.classList.add(isSelected ? "selected" : "dimmed");
  });
  handleResult(correct, state.queue[state.current]);
}

function renderReverse(item) {
  const options = shuffle([item.desc, ...getDescDistractors(item, 3)]);
  state._reverseAnswer = item.desc;
  state._reverseOptions = options;
  const keys = ["A","B","C","D"];
  let c = `<div class="choices" id="choices">`;
  options.forEach((opt, i) => {
    c += `<button class="choice-btn" data-idx="${i}" onclick="submitReverse(${i})"><span class="choice-key">${keys[i]}</span>${opt}</button>`;
  });
  return `<div class="line heading" style="margin:8px 0 8px">What does this command do?</div>
    <div class="reverse-cmd"><code>${item.best}</code></div>
    ${getHintHtml()}
    ${c}</div><div class="kb-hint" style="margin-top:4px">Press <kbd>1</kbd> <kbd>2</kbd> <kbd>3</kbd> <kbd>4</kbd> to pick</div><div id="feedback-area"></div><div id="action-area"></div>`;
}

function submitReverse(idx) {
  const btns = document.querySelectorAll(".choice-btn");
  if ([...btns].some(b => b.classList.contains("correct") || b.classList.contains("wrong"))) return;
  const picked = state._reverseOptions[idx];
  const correct = picked === state._reverseAnswer;
  btns.forEach((btn, i) => {
    btn.style.pointerEvents = "none";
    if (i === idx) btn.classList.add(correct ? "correct" : "wrong");
    if (!correct && state._reverseOptions[i] === state._reverseAnswer) btn.classList.add("reveal");
  });
  // If wrong, show what command actually matches the picked description
  let wrongContext = "";
  if (!correct) {
    const pickedQ = getAllQuestions().find(q => q.desc === picked);
    if (pickedQ) wrongContext = `<div class="line dim" style="font-size:12px;margin-top:6px">"${picked}" is actually what <strong style="color:#f85149">${pickedQ.best}</strong> does.</div>`;
  }
  handleResult(correct, state.queue[state.current], wrongContext);
}

// ═══════════════════════════════════════════
//  RESULT HANDLER
// ═══════════════════════════════════════════

function handleResult(correct, item, wrongContext) {
  wrongContext = wrongContext || "";
  state.answered++;
  state.history.push({ q: item.q, best: item.best, correct, isRetry: item.isRetry });
  if (!item.isRetry) saveQuestionResult(item.id, correct);

  if (correct) {
    if (!item.isRetry) state.firstTryCorrect++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.streak = 0;
    state.wrongMap.set(item.id, (state.wrongMap.get(item.id) || 0) + 1);
    const newFmt = pick(["type","choice","tf","reverse"].filter(f => f !== item.format));
    const insertAt = Math.min(state.current + 2 + Math.floor(Math.random() * 2), state.queue.length);
    state.queue.splice(insertAt, 0, { ...item, format: newFmt, isRetry: true });
  }

  document.getElementById("scoreNum").textContent = `${state.firstTryCorrect}/${state.answered}`;
  document.getElementById("streakText").textContent = state.streak > 1 ? `Streak: ${state.streak}` : "";
  updatePips();

  const fb = document.getElementById("feedback-area");
  const actions = document.getElementById("action-area");

  if (correct) {
    fb.innerHTML = `<div class="line green" style="margin:8px 0">  ✓ Correct!</div>`;
    actions.innerHTML = `<div class="action-row"><button class="btn" onclick="nextQuestion()">Got it →</button><span class="kb-hint" style="margin-left:10px;line-height:34px">or press <kbd>Enter</kbd></span></div>`;
  } else {
    fb.innerHTML = `
      <div class="line red" style="margin:4px 0">  ✗ The answer is: <span style="color:#3fb950;font-weight:600">${item.best}</span></div>
      <div class="explain">${item.explain}</div>
      ${wrongContext}
      <div class="line dim" style="font-size:12px;margin-top:4px">  ↻ This will come back in a different format</div>`;
    actions.innerHTML = `<div class="action-row">
      <button class="btn" onclick="nextQuestion()">Got it →</button>
      <button class="btn drill-more" onclick="drillMoreOnThis()">Drill me more on this</button>
      <span class="kb-hint" style="margin-left:4px;line-height:34px">or <kbd>Enter</kbd></span>
    </div>`;
  }

  state.waitingForUser = true;
  scrollBottom();
}

function nextQuestion() {
  state.waitingForUser = false;
  state.current++;
  state.current < state.queue.length ? showQuestion() : showResults();
}

function drillMoreOnThis() {
  const item = state.queue[state.current];
  const usedFmts = [item.format];
  const allFmts = ["type","choice","tf","reverse"];
  for (let i = 0; i < 2; i++) {
    const avail = allFmts.filter(f => !usedFmts.includes(f));
    const fmt = avail.length > 0 ? pick(avail) : pick(allFmts);
    usedFmts.push(fmt);
    const at = Math.min(state.current + 2 + i + Math.floor(Math.random() * 2), state.queue.length);
    state.queue.splice(at, 0, { ...item, format: fmt, isRetry: true });
  }
  const btn = document.querySelector(".btn.drill-more");
  if (btn) { btn.textContent = "Added! ✓"; btn.style.pointerEvents = "none"; btn.style.opacity = "0.5"; }
  scrollBottom();
}

function showHint() {
  const item = state.queue[state.current];
  document.getElementById("hint-area").innerHTML = `<div class="hint-text">💡 ${item.hint}</div>`;
  const input = document.getElementById("input");
  if (input) input.focus();
}

function getHintHtml() {
  const diff = state.difficulty || "intermediate";
  const item = state.queue[state.current];
  if (diff === "advanced") return `<div id="hint-area"></div>`;
  if (diff === "beginner") return `<div id="hint-area"><div class="hint-text">💡 ${item.hint}</div></div>`;
  return `<div id="hint-area"><button class="hint-btn" onclick="showHint()">hint</button></div>`;
}

function updatePips() {
  const remaining = state.queue.length - state.current;
  let html = "";
  state.history.forEach(h => { html += `<div class="pip ${h.correct ? 'correct' : (h.isRetry ? 'retry' : 'wrong')}"></div>`; });
  if (remaining > 0) html += `<div class="pip current"></div>`;
  for (let i = 1; i < remaining; i++) html += `<div class="pip"></div>`;
  document.getElementById("pips").innerHTML = html;
}

function showResults() {
  scorebar.style.display = "none";
  const total = state.originalCount;
  const pct = Math.round(state.firstTryCorrect / total * 100);

  // Save progress
  saveProgress(state.catKey === "mixed" ? null : state.catKey, state.firstTryCorrect, total);

  let msg, color;
  if (pct === 100) { msg = "Perfect on the first try!"; color = "#3fb950"; }
  else if (pct >= 80) { msg = "Almost perfect! Great job."; color = "#3fb950"; }
  else if (pct >= 50) { msg = "Good progress. Keep drilling!"; color = "#d29922"; }
  else { msg = "You're learning — run it again!"; color = "#f85149"; }

  let html = `<div class="result-card">
    <div class="big-score" style="color:${color}">${state.firstTryCorrect}/${total}</div>
    <div class="pct">${pct}% first-try accuracy</div>
    <div class="msg">${msg}</div>
    ${state.bestStreak > 1 ? `<div class="msg" style="color:#d29922">Best streak: ${state.bestStreak} in a row</div>` : ""}
    ${state.wrongMap.size > 0 ? `<div class="msg dim">Retried ${state.wrongMap.size} question${state.wrongMap.size>1?'s':''} until correct</div>` : ""}
  </div>`;

  if (state.wrongMap.size > 0) {
    html += `<div class="line dim" style="margin-bottom:6px">Needed extra practice:</div><div class="review-list">`;
    const seen = new Set();
    state.history.forEach(h => {
      if (!h.correct && !seen.has(h.q)) {
        seen.add(h.q);
        html += `<div class="review-item"><span class="q">${h.q}</span><br><span class="a">${h.best}</span></div>`;
      }
    });
    html += `</div>`;
  }

  // Suggest next category
  const p = loadProgress();
  const cats = Object.keys(DRILLS);
  let suggestion = null;

  // Find the category with lowest best score, or one never played
  const unplayed = cats.filter(c => !p.categories[c] || p.categories[c].timesPlayed === 0);
  if (unplayed.length > 0) {
    suggestion = { key: unplayed[0], reason: "You haven't tried this one yet" };
  } else {
    let worst = null, worstPct = 101;
    cats.forEach(c => {
      const cp = p.categories[c];
      if (cp && cp.bestPct < worstPct && c !== state.catKey) {
        worstPct = cp.bestPct;
        worst = c;
      }
    });
    if (worst) suggestion = { key: worst, reason: `Your lowest score (${p.categories[worst].bestPct}%)` };
  }

  html += `<div style="text-align:center;margin-top:16px">
    <button class="btn" onclick="showSizePicker('${state.catKey || 'mixed'}')">Retry this drill</button>
    <button class="btn secondary" onclick="showMenu()">All categories</button>
  </div>`;

  if (suggestion) {
    html += `<div style="text-align:center;margin-top:10px">
      <div class="line dim" style="font-size:12px;margin-bottom:6px">Suggested next: ${suggestion.reason}</div>
      <button class="btn drill-more" onclick="showSizePicker('${suggestion.key}')">${DRILLS[suggestion.key].title} →</button>
    </div>`;
  }

  render(html);
  scrollBottom();
}

function sbAddLine(text, cls) { sb.lines.push({ text, cls: cls || 'out' }); }

function sbPromptStr() {
  return `noat@mac ${sb.cwd.replace(sb.home, '~')} $`;
}

function sbNormPath(p) {
  const parts = p.split('/').filter(Boolean);
  const out = [];
  for (const part of parts) {
    if (part === '..') out.pop();
    else if (part !== '.') out.push(part);
  }
  return '/' + out.join('/');
}

function sbResolve(p) {
  if (!p || p === '~') return sb.home;
  if (p.startsWith('~/')) return sb.home + p.slice(1);
  if (p.startsWith('/')) return sbNormPath(p);
  return sbNormPath(sb.cwd + '/' + p);
}

function sbIsDir(p) { return sb.dirs.has(p); }
function sbIsFile(p) { return Object.prototype.hasOwnProperty.call(sb.files, p); }
function sbExists(p) { return sbIsDir(p) || sbIsFile(p); }

function sbDirContents(path) {
  const prefix = path === '/' ? '/' : path + '/';
  const items = new Set();
  for (const d of sb.dirs) {
    if (d !== path && d.startsWith(prefix) && !d.slice(prefix.length).includes('/')) items.add(d.slice(prefix.length));
  }
  for (const f of Object.keys(sb.files)) {
    if (f.startsWith(prefix) && !f.slice(prefix.length).includes('/')) items.add(f.slice(prefix.length));
  }
  return [...items].sort();
}

function sbRunCmd(cmdStr) {
  if (!cmdStr.trim()) return;
  sb.history.push(cmdStr.trim());
  sbAddLine(`${sbPromptStr()} ${cmdStr}`, 'cmd');

  const parts = cmdStr.trim().match(/(?:[^\s"']+|"[^"]*"|'[^']*')+/g) || [];
  const prog = parts[0];
  const args = parts.slice(1).map(a => a.replace(/^["']|["']$/g, ''));

  if (prog === 'pwd') {
    sbAddLine(sb.cwd, 'out');
  } else if (prog === 'ls') {
    sbCmdLs(args);
  } else if (prog === 'cd') {
    sbCmdCd(args);
  } else if (prog === 'mkdir') {
    sbCmdMkdir(args);
  } else if (prog === 'touch') {
    sbCmdTouch(args);
  } else if (prog === 'rm') {
    sbCmdRm(args);
  } else if (prog === 'cat') {
    sbCmdCat(args);
  } else if (prog === 'mv') {
    sbCmdMv(args);
  } else if (prog === 'cp') {
    sbCmdCp(args);
  } else if (prog === 'echo') {
    sbAddLine(args.join(' '), 'out');
  } else if (prog === 'clear') {
    sb.lines = [];
  } else if (prog === 'git') {
    sbCmdGit(args);
  } else if (prog === 'open') {
    sbCmdOpen(args);
  } else if (prog === 'claude') {
    sbAddLine(`✓ Claude Code starting in ${sb.cwd}...`, 'out');
    sbAddLine('> Hi! What would you like to work on?', 'blue');
    sbAddLine('(Simulation — open a real terminal to use Claude Code)', 'muted');
  } else if (prog === 'sudo') {
    sbAddLine('Password:', 'out');
    sbAddLine('sudo: 3 incorrect password attempts', 'err');
  } else if (prog === 'help') {
    sbCmdHelp();
  } else if (prog === 'exit') {
    sbAddLine('Leaving sandbox...', 'muted');
    renderSandbox();
    setTimeout(showMenu, 600);
    return;
  } else if (prog) {
    sbAddLine(`${prog}: command not found`, 'err');
    sbAddLine('Type <strong>help</strong> to see available commands.', 'muted');
  }
  renderSandbox();
}

function sbCmdLs(args) {
  const showAll = args.some(a => a.match(/^-[a-z]*a/));
  const showLong = args.some(a => a.match(/^-[a-z]*l/));
  const targetArg = args.filter(a => !a.startsWith('-'))[0];
  const target = targetArg ? sbResolve(targetArg) : sb.cwd;

  if (!sbExists(target)) { sbAddLine(`ls: ${targetArg}: No such file or directory`, 'err'); return; }
  if (sbIsFile(target)) { sbAddLine(target.split('/').pop(), 'out'); return; }

  let contents = sbDirContents(target);
  if (showAll) contents = ['.', '..', ...contents];

  if (showLong) {
    contents.forEach(name => {
      if (name === '.' || name === '..') { sbAddLine(`drwxr-xr-x  2 noat  staff    64 Apr 10 09:12 ${name}`, 'out'); return; }
      const fp = target === '/' ? '/' + name : target + '/' + name;
      const isDir = sbIsDir(fp);
      sbAddLine(`${isDir ? 'd' : '-'}rwxr-xr-x  1 noat  staff  ${isDir ? '  128' : ' 1.2K'} Apr 10 09:12 ${name}${isDir ? '/' : ''}`, isDir ? 'blue' : 'out');
    });
  } else {
    const line = contents.map(name => {
      const fp = target === '/' ? '/' + name : target + '/' + name;
      return sbIsDir(fp) ? `<span style="color:#58a6ff">${name}/</span>` : name;
    }).join('  ');
    if (line) sbAddLine(line, 'out');
    else sbAddLine('(empty folder)', 'muted');
  }
}

function sbCmdCd(args) {
  const target = args[0] ? sbResolve(args[0]) : sb.home;
  if (!sbExists(target)) { sbAddLine(`cd: ${args[0]}: No such file or directory`, 'err'); return; }
  if (sbIsFile(target)) { sbAddLine(`cd: ${args[0]}: Not a directory`, 'err'); return; }
  sb.cwd = target;
}

function sbCmdMkdir(args) {
  const p = args.includes('-p');
  const name = args.filter(a => !a.startsWith('-'))[0];
  if (!name) { sbAddLine('mkdir: missing operand', 'err'); return; }
  const path = sbResolve(name);
  const parent = path.split('/').slice(0, -1).join('/') || '/';
  if (!p && !sbIsDir(parent)) { sbAddLine(`mkdir: ${name}: No such file or directory`, 'err'); return; }
  if (sbExists(path)) { sbAddLine(`mkdir: ${name}: File exists`, 'err'); return; }
  if (p) {
    const parts = path.split('/').filter(Boolean);
    let cur = '';
    for (const part of parts) { cur += '/' + part; if (!sb.dirs.has(cur)) sb.dirs.add(cur); }
  } else {
    sb.dirs.add(path);
  }
}

function sbCmdTouch(args) {
  if (!args[0]) { sbAddLine('touch: missing operand', 'err'); return; }
  const path = sbResolve(args[0]);
  const parent = path.split('/').slice(0, -1).join('/') || '/';
  if (!sbIsDir(parent)) { sbAddLine(`touch: ${args[0]}: No such file or directory`, 'err'); return; }
  if (!sbIsFile(path)) sb.files[path] = '';
}

function sbCmdRm(args) {
  const recursive = args.some(a => a.match(/^-[a-z]*r/));
  const name = args.filter(a => !a.startsWith('-'))[0];
  if (!name) { sbAddLine('rm: missing operand', 'err'); return; }
  const path = sbResolve(name);
  if (!sbExists(path)) { sbAddLine(`rm: ${name}: No such file or directory`, 'err'); return; }
  if (sbIsDir(path) && !recursive) { sbAddLine(`rm: ${name}: is a directory`, 'err'); sbAddLine(`Tip: use <strong>rm -r ${name}</strong> to delete a folder`, 'muted'); return; }
  if (sbIsDir(path)) {
    for (const d of [...sb.dirs]) { if (d === path || d.startsWith(path + '/')) sb.dirs.delete(d); }
    for (const f of Object.keys(sb.files)) { if (f.startsWith(path + '/')) delete sb.files[f]; }
  } else {
    delete sb.files[path];
  }
}

function sbCmdCat(args) {
  if (!args[0]) { sbAddLine('cat: missing operand', 'err'); return; }
  const path = sbResolve(args[0]);
  if (sbIsDir(path)) { sbAddLine(`cat: ${args[0]}: Is a directory`, 'err'); return; }
  if (!sbIsFile(path)) { sbAddLine(`cat: ${args[0]}: No such file or directory`, 'err'); return; }
  const content = sb.files[path];
  if (!content) { sbAddLine('(empty file)', 'muted'); return; }
  content.split('\n').forEach(line => sbAddLine(line, 'out'));
}

function sbCmdMv(args) {
  const names = args.filter(a => !a.startsWith('-'));
  if (names.length < 2) { sbAddLine('mv: missing destination operand', 'err'); return; }
  const src = sbResolve(names[0]), origDest = sbResolve(names[1]);
  if (!sbExists(src)) { sbAddLine(`mv: ${names[0]}: No such file or directory`, 'err'); return; }
  const dest = sbIsDir(origDest) ? origDest + '/' + src.split('/').pop() : origDest;
  if (sbIsFile(src)) { sb.files[dest] = sb.files[src]; delete sb.files[src]; }
  else {
    for (const d of [...sb.dirs]) {
      if (d === src) { sb.dirs.delete(d); sb.dirs.add(dest); }
      else if (d.startsWith(src + '/')) { sb.dirs.delete(d); sb.dirs.add(dest + d.slice(src.length)); }
    }
    for (const f of Object.keys(sb.files)) {
      if (f.startsWith(src + '/')) { sb.files[dest + f.slice(src.length)] = sb.files[f]; delete sb.files[f]; }
    }
  }
}

function sbCmdCp(args) {
  const names = args.filter(a => !a.startsWith('-'));
  if (names.length < 2) { sbAddLine('cp: missing destination operand', 'err'); return; }
  const src = sbResolve(names[0]), origDest = sbResolve(names[1]);
  if (!sbIsFile(src)) { sbAddLine(`cp: ${names[0]}: not a regular file (use -r for folders)`, 'err'); return; }
  const dest = sbIsDir(origDest) ? origDest + '/' + src.split('/').pop() : origDest;
  sb.files[dest] = sb.files[src];
}

function sbCmdOpen(args) {
  if (!args[0]) { sbAddLine('open: missing argument', 'err'); return; }
  if (args[0] === '.') { sbAddLine(`Opening Finder at ${sb.cwd}...`, 'out'); sbAddLine('(In a real terminal, Finder would open here)', 'muted'); return; }
  const path = sbResolve(args[0]);
  if (!sbExists(path)) { sbAddLine(`open: ${args[0]}: No such file or directory`, 'err'); return; }
  sbAddLine(`Opening ${args[0]}...`, 'out');
  sbAddLine('(In a real terminal, this would open the file in its default app)', 'muted');
}

function sbCmdGit(args) {
  const sub = args[0];
  const inRepo = sb.git.repos.has(sb.cwd);

  if (sub === 'init') {
    if (inRepo) { sbAddLine(`Reinitialized existing Git repository in ${sb.cwd}/.git/`, 'out'); return; }
    sb.git.repos.add(sb.cwd); sb.git.staged = new Set(); sb.git.modified = new Set();
    sbAddLine(`Initialized empty Git repository in ${sb.cwd}/.git/`, 'out'); return;
  }
  if (sub === 'clone') {
    if (!args[1]) { sbAddLine('usage: git clone <url>', 'err'); return; }
    const name = 'my-project';
    sbAddLine(`Cloning into '${name}'...`, 'out');
    sbAddLine('remote: Counting objects: 47, done.', 'out');
    sbAddLine('Receiving objects: 100% (47/47), 18.42 KiB | 2.30 MiB/s, done.', 'out');
    sb.dirs.add(sb.cwd + `/${name}`); sb.dirs.add(sb.cwd + `/${name}/src`);
    sb.files[sb.cwd + `/${name}/README.md`] = '# My Project\nCloned from GitHub.';
    sb.git.repos.add(sb.cwd + `/${name}`); return;
  }
  if (!inRepo) {
    sbAddLine('fatal: not a git repository (or any of the parent directories): .git', 'err');
    sbAddLine('Tip: <strong>cd</strong> into a project folder, or run <strong>git init</strong> here', 'muted'); return;
  }
  if (sub === 'status') {
    sbAddLine(`On branch ${sb.git.branch}`, 'out');
    sbAddLine("Your branch is up to date with 'origin/main'.", 'out');
    sbAddLine('', 'out');
    if (sb.git.staged.size > 0) {
      sbAddLine('Changes to be committed:', 'out');
      for (const f of sb.git.staged) sbAddLine(`\tmodified:   ${f}`, 'cmd');
      sbAddLine('', 'out');
    }
    if (sb.git.modified.size > 0) {
      sbAddLine('Changes not staged for commit:', 'out');
      sbAddLine('  (use "git add <file>..." to stage)', 'muted');
      for (const f of sb.git.modified) sbAddLine(`\tmodified:   ${f}`, 'err');
    }
    if (sb.git.staged.size === 0 && sb.git.modified.size === 0) sbAddLine('nothing to commit, working tree clean', 'out');
  } else if (sub === 'add') {
    const target = args[1];
    if (!target) { sbAddLine('Nothing specified, nothing added.', 'out'); return; }
    if (target === '.' || target === '-A') {
      for (const f of sb.git.modified) sb.git.staged.add(f);
      sb.git.modified.clear();
    } else {
      if (sb.git.modified.has(target)) { sb.git.staged.add(target); sb.git.modified.delete(target); }
      else { sbAddLine(`error: pathspec '${target}' did not match any files known to git`, 'err'); }
    }
  } else if (sub === 'commit') {
    if (sb.git.staged.size === 0) { sbAddLine('nothing to commit, working tree clean', 'out'); return; }
    const mIdx = args.indexOf('-m');
    const msg = mIdx >= 0 ? args.slice(mIdx + 1).join(' ') : '';
    if (!msg) { sbAddLine("error: switch 'm' requires a value", 'err'); sbAddLine("Tip: git commit -m 'your message here'", 'muted'); return; }
    const n = sb.git.staged.size; sb.git.staged.clear();
    sbAddLine(`[${sb.git.branch} a3f92b1] ${msg}`, 'out');
    sbAddLine(` ${n} file${n > 1 ? 's' : ''} changed`, 'out');
  } else if (sub === 'push') {
    sbAddLine('Enumerating objects: 3, done.', 'out');
    sbAddLine('Writing objects: 100% (3/3), 512 bytes | 512.00 KiB/s, done.', 'out');
    sbAddLine(`To github.com:noat/${sb.cwd.split('/').pop()}.git`, 'out');
    sbAddLine(`   a3f92b1..c8d4e2f  ${sb.git.branch} -> ${sb.git.branch}`, 'out');
  } else if (sub === 'pull') {
    sbAddLine('Already up to date.', 'out');
  } else if (sub === 'log') {
    sbAddLine('commit c8d4e2f1a9b3d7e5f2c1a8b4d6e9f3a2b7c5d8e1 (HEAD -> main, origin/main)', 'yellow');
    sbAddLine('Author: noat <noat@example.com>', 'out');
    sbAddLine('Date:   Thu Apr 10 09:00:00 2026 -0700', 'out');
    sbAddLine('', 'out'); sbAddLine('    update styles', 'out'); sbAddLine('', 'out');
    sbAddLine('commit a3f92b1d5c8e2f4a7b9c3d6e1f2a5b8c4d7e3f6a', 'yellow');
    sbAddLine('Author: noat <noat@example.com>', 'out');
    sbAddLine('Date:   Wed Apr  9 14:32:11 2026 -0700', 'out');
    sbAddLine('', 'out'); sbAddLine('    first version', 'out'); sbAddLine('', 'out');
    sbAddLine('(press q to exit in the real terminal)', 'muted');
  } else if (sub === 'diff') {
    if (sb.git.modified.size === 0 && sb.git.staged.size === 0) { sbAddLine('(no changes to show)', 'muted'); return; }
    sbAddLine('diff --git a/index.html b/index.html', 'out');
    sbAddLine('--- a/index.html', 'err'); sbAddLine('+++ b/index.html', 'cmd');
    sbAddLine('@@ -1,5 +1,6 @@', 'yellow');
    sbAddLine(' <html>', 'out'); sbAddLine('-  <h1>Hello</h1>', 'err');
    sbAddLine('+  <h1>Hello World!</h1>', 'cmd'); sbAddLine('+  <p>Welcome</p>', 'cmd');
    sbAddLine(' </html>', 'out');
  } else if (sub === 'checkout') {
    if (args[1] === '-b') {
      const name = args[2]; if (!name) { sbAddLine("error: switch 'b' requires a value", 'err'); return; }
      sb.git.branch = name; sbAddLine(`Switched to a new branch '${name}'`, 'out');
    } else if (args[1]) { sb.git.branch = args[1]; sbAddLine(`Switched to branch '${args[1]}'`, 'out'); }
  } else {
    sbAddLine(`git: '${sub}' is not a git command. See 'git help'.`, 'err');
  }
}

function sbCmdHelp() {
  const cmds = [
    ['pwd','Print current folder path'], ['ls','List files'], ['ls -a','Include hidden files'],
    ['ls -l','Show details (size, date)'], ['cd folder','Go into a folder'], ['cd ..','Go up one level'],
    ['cd ~','Go home'], ['mkdir name','Create a folder'], ['mkdir -p a/b','Create nested folders'],
    ['touch name','Create an empty file'], ['rm file','Delete a file'], ['rm -r folder','Delete a folder'],
    ['cat file','Show file contents'], ['mv src dest','Move or rename'], ['cp src dest','Copy a file'],
    ['echo text','Print text'], ['open .','Open Finder here'], ['clear','Clear the screen'],
    ['git status','Check git status'], ['git add .','Stage all changes'], ["git commit -m 'msg'",'Save a snapshot'],
    ['git push','Send to GitHub'], ['git pull','Get latest from GitHub'], ['git log','See history'],
    ['git diff','See what changed'], ['git init','Start a git project'], ['git clone URL','Download a project'],
    ['claude','Start Claude Code'], ['exit','Leave sandbox'],
  ];
  sbAddLine('Available commands:', 'yellow');
  cmds.forEach(([cmd, desc]) => {
    sbAddLine(`  <span style="color:#3fb950;display:inline-block;min-width:200px">${cmd}</span><span style="color:#484f58">${desc}</span>`, 'out');
  });
}

function renderSandbox() {
  let html = `
    <button class="back-btn" onclick="showMenu()">← Back to menu</button>
    <div class="line bold heading">Sandbox Terminal</div>
    <div class="line dim" style="margin-bottom:10px">Nothing here is real — practice freely! Type <strong style="color:#c9d1d9">help</strong> to see all commands.</div>
    <div id="sb-output">`;
  for (const line of sb.lines) html += `<div class="sb-line ${line.cls}">${line.text}</div>`;
  html += `</div>
    <div class="sb-input-row">
      <span class="sb-prompt">${sbPromptStr()}</span>
      <input type="text" id="sb-input" placeholder="type a command..." autocomplete="off" spellcheck="false" autofocus>
    </div>`;
  render(html);

  const input = document.getElementById('sb-input');
  if (!input) return;
  input.focus();
  let histIdx = sb.history.length;
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const val = input.value; input.value = '';
      sbRunCmd(val); histIdx = sb.history.length;
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (histIdx > 0) { histIdx--; input.value = sb.history[histIdx]; }
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (histIdx < sb.history.length - 1) { histIdx++; input.value = sb.history[histIdx]; }
      else { histIdx = sb.history.length; input.value = ''; }
    } else if (e.key === 'Tab') {
      e.preventDefault(); sbTabComplete(input);
    }
  });
  scrollBottom();
}

function sbTabComplete(input) {
  const val = input.value;
  const parts = val.split(' ');
  const last = parts[parts.length - 1];
  const isFirst = parts.length === 1;

  if (isFirst) {
    const cmds = ['pwd','ls','cd','mkdir','touch','rm','cat','mv','cp','echo','open','clear','git','claude','exit','help'];
    const matches = cmds.filter(c => c.startsWith(last));
    if (matches.length === 1) { input.value = matches[0] + ' '; }
    else if (matches.length > 1) {
      sbAddLine(matches.join('  '), 'muted');
      renderSandbox(); const ni = document.getElementById('sb-input'); if (ni) { ni.value = val; ni.focus(); }
    }
    return;
  }

  const prefix = last.includes('/') ? last.slice(0, last.lastIndexOf('/') + 1) : '';
  const partial = last.includes('/') ? last.slice(last.lastIndexOf('/') + 1) : last;
  const dir = prefix ? sbResolve(prefix) : sb.cwd;
  const items = sbDirContents(dir).filter(i => i.startsWith(partial));

  if (items.length === 1) {
    const fp = dir + '/' + items[0];
    parts[parts.length - 1] = prefix + items[0] + (sbIsDir(fp) ? '/' : ' ');
    input.value = parts.join(' ');
  } else if (items.length > 1) {
    sbAddLine(items.join('  '), 'muted');
    renderSandbox(); const ni = document.getElementById('sb-input'); if (ni) { ni.value = val; ni.focus(); }
  }
}

document.addEventListener("keydown", e => {
  if (state.waitingForUser && e.key === "Enter") { nextQuestion(); return; }
  const item = state.queue?.[state.current];
  if (!item || state.waitingForUser) return;
  if (item.format === "choice" || item.format === "reverse") {
    const map = {a:0,b:1,c:2,d:3,"1":0,"2":1,"3":2,"4":3};
    if (map[e.key.toLowerCase()] !== undefined) {
      item.format === "choice" ? submitChoice(map[e.key.toLowerCase()]) : submitReverse(map[e.key.toLowerCase()]);
    }
  }
  if (item.format === "tf") {
    if (e.key.toLowerCase()==="t"||e.key==="1") submitTF(true);
    if (e.key.toLowerCase()==="f"||e.key==="2") submitTF(false);
  }
});

showMenu();
</script>
