<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal & Claude Code Drills</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
    padding: 20px;
  }
  #app { width: 100%; max-width: 720px; }
  .terminal {
    background: #0d1117; border-radius: 12px; overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .terminal-bar {
    background: #161b22; padding: 12px 16px;
    display: flex; align-items: center; gap: 8px;
    border-bottom: 1px solid #21262d;
  }
  .dot { width: 12px; height: 12px; border-radius: 50%; }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }
  .terminal-title {
    color: #8b949e; font-size: 13px; margin-left: 8px; flex: 1; text-align: center;
  }
  .terminal-body {
    padding: 20px; min-height: 420px; max-height: 70vh; overflow-y: auto;
  }
  .terminal-body::-webkit-scrollbar { width: 6px; }
  .terminal-body::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
  .line { color: #c9d1d9; font-size: 14px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; }
  .line.dim { color: #484f58; }
  .line.green { color: #3fb950; }
  .line.red { color: #f85149; }
  .line.yellow { color: #d29922; }
  .line.bold { font-weight: 700; }
  .line.heading { color: #58a6ff; font-weight: 700; font-size: 15px; padding: 6px 0; }
  .format-tag {
    display: inline-block; font-size: 10px; font-weight: 700; padding: 2px 7px;
    border-radius: 3px; margin-left: 8px; vertical-align: middle;
  }
  .format-tag.type { background: #238636; color: #fff; }
  .format-tag.choice { background: #58a6ff; color: #0d1117; }
  .format-tag.tf { background: #bc8cff; color: #0d1117; }
  .format-tag.reverse { background: #d29922; color: #0d1117; }
  .input-row { display: flex; align-items: center; margin-top: 8px; padding: 2px 0; }
  .prompt-symbol { color: #3fb950; font-weight: 700; margin-right: 8px; font-size: 14px; user-select: none; }
  #input {
    flex: 1; background: none; border: none; color: #f0f6fc;
    font-family: inherit; font-size: 14px; outline: none; caret-color: #58a6ff;
  }
  #input::placeholder { color: #30363d; }
  .choices { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
  .choice-btn {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 12px; color: #c9d1d9; font-family: inherit; font-size: 13px;
    cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .choice-btn:hover { background: #1c2333; border-color: #58a6ff; color: #f0f6fc; }
  .choice-btn.correct { background: #0f2d16; border-color: #3fb950; color: #3fb950; }
  .choice-btn.wrong { background: #2d0f0f; border-color: #f85149; color: #f85149; }
  .choice-btn.reveal { border-color: #3fb950; color: #3fb950; opacity: 0.7; }
  .choice-btn .choice-key {
    display: inline-block; width: 22px; height: 22px; border-radius: 4px;
    background: #21262d; color: #8b949e; text-align: center; line-height: 22px;
    font-size: 11px; font-weight: 700; margin-right: 8px;
  }
  .choice-btn.correct .choice-key { background: #238636; color: #fff; }
  .choice-btn.wrong .choice-key { background: #da3633; color: #fff; }
  .tf-statement {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 16px; margin: 12px 0; font-size: 14px; color: #f0f6fc; line-height: 1.6;
  }
  .tf-statement .tf-cmd { color: #3fb950; font-weight: 700; }
  .tf-statement .tf-arrow { color: #484f58; margin: 0 8px; }
  .tf-buttons { display: flex; gap: 10px; margin: 8px 0; }
  .tf-btn {
    flex: 1; padding: 14px; border-radius: 8px; font-family: inherit;
    font-size: 15px; font-weight: 700; cursor: pointer; transition: all 0.15s; border: 2px solid;
  }
  .tf-btn.true-btn { background: #0f2d16; border-color: #238636; color: #3fb950; }
  .tf-btn.true-btn:hover { background: #163b22; }
  .tf-btn.false-btn { background: #2d0f0f; border-color: #da3633; color: #f85149; }
  .tf-btn.false-btn:hover { background: #3b1616; }
  .tf-btn.selected { opacity: 1; transform: scale(1.02); }
  .tf-btn.dimmed { opacity: 0.3; pointer-events: none; }
  .reverse-cmd {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 14px 16px; margin: 10px 0; font-size: 16px; text-align: center;
  }
  .reverse-cmd code { color: #3fb950; font-weight: 700; font-size: 18px; }
  .score-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 20px; background: #161b22;
    border-top: 1px solid #21262d; font-size: 13px; color: #8b949e;
  }
  .score-bar .score { color: #3fb950; font-weight: 700; }
  .score-bar .streak { color: #d29922; }
  .progress { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; max-width: 50%; justify-content: center; }
  .pip { width: 8px; height: 8px; border-radius: 50%; background: #21262d; transition: background 0.3s; }
  .pip.correct { background: #3fb950; }
  .pip.wrong { background: #f85149; }
  .pip.retry { background: #d29922; }
  .pip.current { background: #58a6ff; box-shadow: 0 0 6px #58a6ff; }
  .categories { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
  .cat-btn {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 14px 12px; color: #c9d1d9; font-family: inherit; font-size: 13px;
    cursor: pointer; text-align: left; transition: all 0.15s;
  }
  .cat-btn:hover { background: #1c2333; border-color: #58a6ff; color: #f0f6fc; }
  .cat-btn .cat-num { color: #58a6ff; font-weight: 700; margin-right: 6px; }
  .cat-btn .cat-desc { display: block; color: #484f58; font-size: 11px; margin-top: 4px; }
  .result-card {
    background: #161b22; border: 1px solid #21262d; border-radius: 8px;
    padding: 20px; margin: 12px 0; text-align: center;
  }
  .result-card .big-score { font-size: 48px; font-weight: 700; }
  .result-card .pct { font-size: 20px; color: #8b949e; margin-top: 4px; }
  .result-card .msg { margin-top: 12px; color: #8b949e; font-size: 14px; }
  .review-list {
    text-align: left; margin: 12px 0; padding: 12px;
    background: #0d1117; border-radius: 6px; border: 1px solid #21262d;
  }
  .review-item { padding: 6px 0; font-size: 13px; border-bottom: 1px solid #161b22; }
  .review-item:last-child { border: none; }
  .review-item .q { color: #8b949e; }
  .review-item .a { color: #3fb950; font-weight: 600; }
  .btn {
    background: #238636; border: 1px solid #2ea043; color: #fff;
    font-family: inherit; font-size: 14px; padding: 10px 24px;
    border-radius: 6px; cursor: pointer; margin: 4px; transition: background 0.15s;
  }
  .btn:hover { background: #2ea043; }
  .btn.secondary { background: #21262d; border-color: #30363d; }
  .btn.secondary:hover { background: #30363d; }
  .btn.drill-more { background: #6e40c9; border-color: #8957e5; }
  .btn.drill-more:hover { background: #8957e5; }
  .hint-btn {
    background: none; border: 1px solid #30363d; color: #484f58;
    font-family: inherit; font-size: 11px; padding: 2px 8px;
    border-radius: 4px; cursor: pointer;
  }
  .hint-btn:hover { color: #8b949e; border-color: #484f58; }
  .hint-text { color: #d29922; font-size: 12px; margin-top: 4px; font-style: italic; }
  .explain {
    background: #161b22; border: 1px solid #21262d; border-radius: 6px;
    padding: 10px 12px; margin: 8px 0; font-size: 13px; color: #8b949e; line-height: 1.6;
  }
  .explain strong { color: #58a6ff; font-weight: 600; }
  .explain .when { color: #d29922; display: block; margin-top: 6px; font-style: italic; }
  .retry-badge {
    display: inline-block; background: #d29922; color: #0d1117;
    font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 3px; margin-left: 8px;
  }
  .action-row { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  @media (max-width: 500px) {
    .categories { grid-template-columns: 1fr; }
    .choices { grid-template-columns: 1fr; }
    .terminal-body { padding: 14px; min-height: 350px; }
  }
</style>
</head>
<body>
<div id="app">
  <div class="terminal">
    <div class="terminal-bar">
      <div class="dot dot-red"></div>
      <div class="dot dot-yellow"></div>
      <div class="dot dot-green"></div>
      <div class="terminal-title">Terminal Drills — noat@mac</div>
    </div>
    <div class="terminal-body" id="body"></div>
    <div class="score-bar" id="scorebar" style="display:none">
      <div>Score: <span class="score" id="scoreNum">0/0</span></div>
      <div class="progress" id="pips"></div>
      <div class="streak" id="streakText"></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  QUESTION BANK
//  Every explain now includes a <span class="when"> with a real-life scenario
// ═══════════════════════════════════════════

const DRILLS = {
  workflow: {
    title: "Daily Workflow",
    desc: "Real scenarios with Claude Code",
    questions: [
      { q: "You just opened Terminal. How do you start Claude Code?", best: "claude", desc: "Launches Claude Code in the current folder", accept: s => has(s,"claude"), hint: "Just the name of the tool.", explain: "<strong>claude</strong> — starts a new session in your current folder.<span class='when'>Use this: every time you open Terminal and want to start working with Claude.</span>" },
      { q: "You want to open Claude Code in your 'website' project folder", best: "cd website then claude (or claude --directory website)", desc: "Navigate to project folder then start Claude", accept: s => (has(s,"cd") && has(s,"claude")) || has(s,"--directory") || (has(s,"claude") && has(s,"website")), hint: "First go there, then start Claude.", explain: "First <strong>cd website</strong>, then <strong>claude</strong>. Claude works on whatever folder you're in.<span class='when'>Use this: when you have multiple projects and need Claude to focus on a specific one.</span>" },
      { q: "You open your laptop to continue yesterday's work with Claude. How?", best: "claude /resume or claude --continue", desc: "Resume the previous Claude Code conversation", accept: s => hasAny(s,["/resume","/continue","--continue","-c"]), hint: "There's a way to pick up where you left off.", explain: "<strong>/resume</strong> inside Claude, or start with <strong>claude --continue</strong>.<span class='when'>Use this: every morning when you want to pick up exactly where you left off.</span>" },
      { q: "Claude asks permission to edit a file. You want to let it. What do you press?", best: "y or Enter (to approve)", desc: "Approve Claude's file edit request", accept: s => hasAny(s,["y","yes","enter","approve","accept","allow"]), hint: "The simplest key for 'yes'.", explain: "Press <strong>y</strong> or <strong>Enter</strong> to approve. You can also press <strong>n</strong> to deny.<span class='when'>Use this: every time Claude wants to edit, create, or delete a file — you're the gatekeeper.</span>" },
      { q: "You want Claude to make changes without asking permission every time", best: "Shift+Tab to switch to auto/accept mode", desc: "Switch to a more permissive mode", accept: s => hasAny(s,["shift+tab","shift tab","auto","accept","bypass"]), hint: "There's a keyboard shortcut to cycle through permission modes.", explain: "<strong>Shift+Tab</strong> cycles through modes: default → acceptEdits → plan → auto. Each is more permissive.<span class='when'>Use this: when you trust Claude on a task and the permission prompts are slowing you down.</span>" },
      { q: "Claude made changes you don't like. How do you see exactly what changed?", best: "/diff", desc: "Review all file changes Claude made", accept: s => has(s,"/diff") || has(s,"diff"), hint: "Short for 'difference'.", explain: "<strong>/diff</strong> — shows every change: green = added, red = removed.<span class='when'>Use this: ALWAYS after Claude edits files, before you move on. Get in the habit of reviewing.</span>" },
      { q: "Claude edited a file and you want to UNDO those changes", best: "Tell Claude to undo, or git checkout filename", desc: "Revert Claude's changes to a file", accept: s => hasAny(s,["undo","revert","checkout","restore","tell claude","ask claude"]), hint: "You can either ask Claude to fix it, or use a git command.", explain: "Easiest: just tell Claude <strong>'undo those changes'</strong>. Or use <strong>git checkout filename</strong> to restore the last saved version.<span class='when'>Use this: when Claude changed something and it broke, or you changed your mind.</span>" },
      { q: "Claude's response is getting really long and you don't need it. Stop it.", best: "Ctrl+C", desc: "Cancel Claude's current response", accept: s => hasAll(s,["ctrl","c"]) || hasAll(s,["control","c"]), hint: "The universal stop button.", explain: "<strong>Ctrl+C</strong> — stops Claude immediately. Your conversation is safe.<span class='when'>Use this: when Claude is going down a wrong path or generating more than you need.</span>" },
      { q: "You want Claude to look at a specific file. How do you mention it?", best: "@ followed by the filename", desc: "Reference a file using @ autocomplete", accept: s => has(s,"@"), hint: "Like tagging someone on social media.", explain: "<strong>@filename</strong> — autocompletes as you type. Claude will read the file.<span class='when'>Use this: when you want Claude to look at, analyze, or modify a specific file.</span>" },
      { q: "You want Claude to plan first, not start changing things right away", best: "/plan or Shift+Tab to plan mode", desc: "Switch to plan mode before executing", accept: s => hasAny(s,["/plan","plan mode","shift+tab","shift tab"]), hint: "There's a mode where Claude thinks but doesn't act.", explain: "<strong>/plan</strong> or <strong>Shift+Tab</strong> to cycle to plan mode.<span class='when'>Use this: when a task is complex and you want to review Claude's approach before it starts editing.</span>" },
      { q: "The conversation is getting long and Claude seems confused. What do you do?", best: "/clear to start fresh", desc: "Clear the conversation to reset Claude's context", accept: s => hasAny(s,["/clear","/reset","/new","clear","start fresh","new"]), hint: "Sometimes the best fix is a clean slate.", explain: "<strong>/clear</strong> — starts a fresh conversation. Your files aren't affected.<span class='when'>Use this: when Claude keeps misunderstanding you, or you're switching to a completely different task.</span>" },
      { q: "You want to work on a different project without closing Claude", best: "/clear then cd to the other project folder", desc: "Switch projects by clearing and navigating", accept: s => (has(s,"cd") && hasAny(s,["/clear","clear"])) || has(s,"add-dir"), hint: "Clear your conversation, then move to the new folder.", explain: "<strong>/clear</strong> then <strong>! cd ~/other-project</strong>. Or exit and restart in the new folder.<span class='when'>Use this: when you're done with one project and want to switch to another.</span>" },
      { q: "You want to save the work Claude did before closing", best: "git add . && git commit -m 'message'", desc: "Save your work with git before ending the session", accept: s => (has(s,"git") && has(s,"commit")) || has(s,"ask claude") || has(s,"tell claude"), hint: "Use git to take a snapshot, or just ask Claude to do it.", explain: "Run <strong>git add . && git commit -m 'save progress'</strong> — or just tell Claude <strong>'commit my changes'</strong>.<span class='when'>Use this: before closing Terminal or ending your session, so nothing is lost.</span>" },
      { q: "You want to see what Claude is doing under the hood (which files it reads, etc.)", best: "Ctrl+O (verbose mode)", desc: "Toggle verbose output to see Claude's actions", accept: s => hasAll(s,["ctrl","o"]) || hasAll(s,["control","o"]) || has(s,"verbose"), hint: "A keyboard shortcut that toggles detailed output.", explain: "<strong>Ctrl+O</strong> — shows every tool Claude uses: file reads, searches, edits.<span class='when'>Use this: when you're curious what Claude is actually doing, or when debugging why something went wrong.</span>" },
      { q: "Someone sent you a GitHub link to a project. How do you download it and start working?", best: "git clone [URL] then cd into it then claude", desc: "Clone the repo, enter it, start Claude", accept: s => has(s,"git") && has(s,"clone"), hint: "Three steps: download it, enter the folder, start Claude.", explain: "<strong>git clone URL</strong>, then <strong>cd project-name</strong>, then <strong>claude</strong>.<span class='when'>Use this: the first time you work on someone else's project from GitHub.</span>" },
      { q: "You made a mistake in what you told Claude. How do you take it back?", best: "Ctrl+C to stop, then give the correct instruction", desc: "Cancel and re-instruct Claude", accept: s => hasAll(s,["ctrl","c"]) || hasAll(s,["control","c"]) || hasAny(s,["stop","cancel","undo"]), hint: "Stop what's happening, then try again with better instructions.", explain: "<strong>Ctrl+C</strong> to stop Claude, then type your corrected instruction.<span class='when'>Use this: when you realize mid-generation that you asked for the wrong thing.</span>" },
    ]
  },
  navigation: {
    title: "Where Am I?",
    desc: "Navigation basics",
    questions: [
      { q: "What command shows which folder you're currently in?", best: "pwd", desc: "Shows the full path of the folder you're in", accept: s => has(s,"pwd") || hasAll(s,["print","working","directory"]), hint: "It's a 3-letter command. Think about what you'd want to PRINT about where you're WORKING.", explain: "<strong>pwd</strong> = Print Working Directory.<span class='when'>Use this: when you're not sure where you are, or before running a command that depends on your location.</span>" },
      { q: "What command lists all files in the current folder?", best: "ls", desc: "Lists files and folders in the current directory", accept: s => has(s,"ls") || has(s,"list"), hint: "It's a very short command — just 2 letters. What's a short way to say 'list'?", explain: "<strong>ls</strong> = list. Shows all files and folders where you are.<span class='when'>Use this: when you want to see what's in a folder — like checking what files a project contains.</span>" },
      { q: "How do you go UP one folder level?", best: "cd ..", desc: "Moves up one folder level", accept: s => has(s,"cd") && has(s,".."), hint: "You need two things: the 'go to' command plus a symbol that means 'parent'.", explain: "<strong>cd ..</strong> — <strong>cd</strong> = change directory, <strong>..</strong> = the folder above.<span class='when'>Use this: when you went into a subfolder and need to go back up.</span>" },
      { q: "How do you go to your home folder from anywhere?", best: "cd ~", desc: "Goes straight to your home folder", accept: s => (has(s,"cd") && has(s,"~")) || s.trim()==="cd", hint: "There's a special wavy symbol that always means 'home'.", explain: "<strong>cd ~</strong> or just <strong>cd</strong> — takes you to /Users/noat from anywhere.<span class='when'>Use this: when you're lost or want to start navigating from a familiar place.</span>" },
      { q: "What does the ~ symbol mean in a path?", best: "Home folder", desc: "Represents your home directory", accept: s => hasAny(s,["home"]), hint: "Think about where you always end up when you feel lost.", explain: "<strong>~</strong> = your home folder. So <strong>~/Documents</strong> = /Users/noat/Documents.<span class='when'>Appears in: almost every path you'll type. It saves you from typing the full /Users/noat every time.</span>" },
      { q: "How do you enter a folder called 'projects'?", best: "cd projects", desc: "Enters into the 'projects' folder", accept: s => has(s,"cd") && has(s,"project"), hint: "You need the 'change directory' command followed by the folder name.", explain: "<strong>cd projects</strong> — like walking through a door into that room.<span class='when'>Use this: when you want to open/work on a project — first cd into its folder.</span>" },
      { q: "What does '/' at the very start of a path mean?", best: "Root (top of the file system)", desc: "The root — the top of the entire file system", accept: s => hasAny(s,["root","absolute","top","beginning"]), hint: "It's the very highest point — everything else lives below it.", explain: "<strong>/</strong> at the start = the root, the top of the entire file system.<span class='when'>You'll see this in: error messages and full file paths like /Users/noat/projects.</span>" },
      { q: "How do you list files INCLUDING hidden ones?", best: "ls -a", desc: "Lists all files including hidden ones (dotfiles)", accept: s => has(s,"ls") && hasAny(s,["-a","-la","-al","all"]), hint: "Same list command, but with a flag. What letter means 'all'?", explain: "<strong>ls -a</strong> — shows hidden files too (they start with a dot like .claude).<span class='when'>Use this: when looking for config files like .git, .env, or .claude that don't show up normally.</span>" },
      { q: "What does 'cd' stand for?", best: "Change Directory", desc: "Stands for Change Directory", accept: s => hasAll(s,["change","directory"]), hint: "Two words. The first means 'switch', the second is another word for 'folder'.", explain: "<strong>cd</strong> = Change Directory. The command for moving between folders.<span class='when'>You'll use this: dozens of times a day. It's the most basic navigation command.</span>" },
      { q: "What does '.' (single dot) mean in a path?", best: "The current folder", desc: "Represents the current folder you're in", accept: s => hasAny(s,["current","here","this folder","this directory","present"]), hint: "It points to exactly where you are standing right now.", explain: "<strong>.</strong> = the current folder (right here).<span class='when'>Used in: <strong>open .</strong> to open Finder here, <strong>git add .</strong> to stage everything here.</span>" },
      { q: "What does '..' (double dot) mean in a path?", best: "The parent folder (one level up)", desc: "Represents the parent folder (one level up)", accept: s => hasAny(s,["parent","up","above","one level"]), hint: "If single dot is 'here', double dot is...", explain: "<strong>..</strong> = the parent folder (one level up).<span class='when'>Use this: when you need to go back up after entering a subfolder.</span>" },
      { q: "You're lost deep in folders. Quick way back to your home folder?", best: "cd ~", desc: "Jump back to home folder from anywhere", accept: s => (has(s,"cd") && has(s,"~")) || s.trim()==="cd", hint: "There's a rescue command that always takes you home, no matter where you are.", explain: "<strong>cd ~</strong> or just <strong>cd</strong> — the rescue command.<span class='when'>Use this: when you've been cd-ing around and have no idea where you ended up.</span>" },
      { q: "What's the difference between 'ls' and 'ls -l'?", best: "ls -l shows details (size, date, permissions)", desc: "ls -l shows detailed file information", accept: s => hasAny(s,["detail","long","size","date","permission","more info","extra"]), hint: "The -l flag makes the output much more informative. L stands for...?", explain: "<strong>ls -l</strong> (long format) adds size, date, owner for each file.<span class='when'>Use this: when you need to check file sizes or when a file was last changed.</span>" },
      { q: "How do you go up TWO folder levels at once?", best: "cd ../..", desc: "Moves up two folder levels at once", accept: s => has(s,"cd") && has(s,"../.."), hint: "You can stack the 'parent' symbol with a / separator between them.", explain: "<strong>cd ../..</strong> — chain <strong>..</strong> with <strong>/</strong> to go up multiple levels.<span class='when'>Use this: when you're deep in a subfolder and need to get back up quickly.</span>" },
      { q: "What does 'ls' stand for?", best: "List", desc: "Stands for List", accept: s => has(s,"list"), hint: "Just one word — what does the command do?", explain: "<strong>ls</strong> = list. Lists the contents of your current folder.<span class='when'>You'll use this: constantly, to see what files and folders are around you.</span>" },
      { q: "What does 'pwd' stand for?", best: "Print Working Directory", desc: "Stands for Print Working Directory", accept: s => hasAll(s,["print","working","directory"]), hint: "Three words: P___ W___ D___", explain: "<strong>pwd</strong> = Print Working Directory.<span class='when'>Use this: when you see 'No such file' errors and want to confirm you're in the right folder.</span>" },
    ]
  },
  files: {
    title: "Files & Folders",
    desc: "Create, move, delete",
    questions: [

      { q: "Create a new empty file called 'notes.txt'", best: "touch notes.txt", desc: "Creates a new empty file", accept: s => has(s,"touch") && has(s,"notes"), hint: "The command name is something gentle you'd do with a finger.", explain: "<strong>touch notes.txt</strong> — creates an empty file.<span class='when'>Use this: when you need a new file to exist before editing it, or when Claude asks for a file that doesn't exist yet.</span>" },
      { q: "Rename 'old.txt' to 'new.txt'", best: "mv old.txt new.txt", desc: "Renames a file by moving it to a new name", accept: s => has(s,"mv") && has(s,"old") && has(s,"new"), hint: "In terminal, renaming uses the same command as relocating.", explain: "<strong>mv old.txt new.txt</strong> — mv = move. Same folder + new name = rename.<span class='when'>Use this: when a file has the wrong name, or you want to organize your files.</span>" },
      { q: "Copy 'file.txt' into a folder called 'backup'", best: "cp file.txt backup/", desc: "Duplicates a file into another folder", accept: s => has(s,"cp") && has(s,"file") && has(s,"backup"), hint: "Two letters that mean 'duplicate'.", explain: "<strong>cp file.txt backup/</strong> — cp = copy. Original stays, copy goes to backup.<span class='when'>Use this: before making risky changes — copy the file as a backup first.</span>" },
      { q: "Delete a file called 'junk.txt'", best: "rm junk.txt", desc: "Permanently deletes a file", accept: s => has(s,"rm") && has(s,"junk"), hint: "Two letters that mean 'get rid of'. Be careful — no trash can!", explain: "<strong>rm junk.txt</strong> — rm = remove. Gone for good!<span class='when'>Use this: to clean up files you definitely don't need. Double-check the filename first!</span>" },
      { q: "Delete a folder called 'old' and everything inside it", best: "rm -r old", desc: "Deletes a folder and all its contents recursively", accept: s => has(s,"rm") && has(s,"-r") && has(s,"old"), hint: "Same delete command, but you need a flag to go through all subfolders.", explain: "<strong>rm -r old</strong> — <strong>-r</strong> = recursive (go inside everything).<span class='when'>Use this: when you want to delete an entire project folder or clean up old directories.</span>" },
      { q: "See the contents of 'readme.txt' in the terminal", best: "cat readme.txt", desc: "Prints file contents to the screen", accept: s => hasAny(s,["cat","less","more"]) && has(s,"readme"), hint: "Named after an animal. It con-CAT-enates file contents to your screen.", explain: "<strong>cat readme.txt</strong> prints the file to screen.<span class='when'>Use this: for a quick peek at a file's contents without opening an editor.</span>" },
      { q: "Open the current folder in Finder (macOS)", best: "open .", desc: "Opens the current folder in Finder", accept: s => has(s,"open") && has(s,"."), hint: "The macOS launcher command + the symbol that means 'here'.", explain: "<strong>open .</strong> — opens Finder at your current location.<span class='when'>Use this: when you want to see your files visually, drag-drop things, or double-click to open.</span>" },
      { q: "What does 'mkdir' stand for?", best: "Make Directory", desc: "Stands for Make Directory", accept: s => hasAll(s,["make","directory"]) || hasAll(s,["make","dir"]), hint: "Two words: what it does + another word for 'folder'.", explain: "<strong>mkdir</strong> = Make Directory. Directory = folder.<span class='when'>Whenever you see 'dir' or 'directory' in terminal, it just means folder.</span>" },
      { q: "What does 'rm' stand for?", best: "Remove", desc: "Stands for Remove", accept: s => has(s,"remove"), hint: "It's what you do when you want something gone permanently.", explain: "<strong>rm</strong> = Remove. Permanent deletion.<span class='when'>Remember: there's NO undo and NO trash can. Always pause and double-check before using rm.</span>" },
      { q: "What does 'mv' stand for?", best: "Move", desc: "Stands for Move", accept: s => has(s,"move"), hint: "It relocates things from one place to another.", explain: "<strong>mv</strong> = Move. Also used for renaming (move to a new name).<span class='when'>Use this: to reorganize files between folders, or to rename things.</span>" },
      { q: "What does 'cp' stand for?", best: "Copy", desc: "Stands for Copy", accept: s => has(s,"copy"), hint: "It makes a duplicate of something.", explain: "<strong>cp</strong> = Copy. Original stays, duplicate goes where you say.<span class='when'>Use this: when you want to keep the original and also have a copy somewhere else.</span>" },
      { q: "Move 'photo.jpg' into ~/Pictures", best: "mv photo.jpg ~/Pictures/", desc: "Moves a file to a different folder", accept: s => has(s,"mv") && has(s,"photo") && has(s,"picture"), hint: "Same command you use for renaming, but the destination is a folder.", explain: "<strong>mv photo.jpg ~/Pictures/</strong> — disappears from here, appears there.<span class='when'>Use this: to organize files into the right folders.</span>" },

      { q: "Open a file called 'design.pdf' with its default app", best: "open design.pdf", desc: "Opens a file with its default application", accept: s => has(s,"open") && has(s,"design"), hint: "Same command you used for Finder, but point it at a file instead.", explain: "<strong>open design.pdf</strong> — opens with the default app (Preview, etc.).<span class='when'>Use this: when you want to view images, PDFs, or any file in its normal app.</span>" },

  git: {
    title: "Git Essentials",
    desc: "Save & share your work",
    questions: [
      { q: "Check the current status of your git project", best: "git status", desc: "Shows what's changed, staged, and which branch you're on", accept: s => has(s,"git") && has(s,"status"), hint: "The most natural word for 'what's happening right now'.", explain: "<strong>git status</strong> — your project's dashboard.<span class='when'>Use this: when you're not sure what's changed, or before committing to see what will be included.</span>" },
      { q: "Stage ALL changed files for a commit", best: "git add .", desc: "Prepares all changed files for the next commit", accept: s => has(s,"git") && has(s,"add") && hasAny(s,[".","-a","-A","all"]), hint: "You're ADDing files to the staging area. Use a symbol that means 'everything here'.", explain: "<strong>git add .</strong> — stages everything. Like packing items before shipping.<span class='when'>Use this: when you want to save ALL your changes. Always do this before git commit.</span>" },
      { q: "Commit with the message 'first version'", best: "git commit -m 'first version'", desc: "Saves a snapshot of staged changes with a message", accept: s => has(s,"git") && has(s,"commit") && has(s,"-m"), hint: "You need the commit command plus a flag that lets you attach a short note.", explain: "<strong>git commit -m 'first version'</strong> — saves a snapshot with a label.<span class='when'>Use this: after staging files with git add. Commit often — it's like saving your game.</span>" },
      { q: "Push your commits to GitHub", best: "git push", desc: "Sends your local commits to the remote repository", accept: s => has(s,"git") && has(s,"push"), hint: "You're sending your work UP to the cloud.", explain: "<strong>git push</strong> — sends your commits to GitHub.<span class='when'>Use this: when you want to share your work, back it up online, or collaborate with others.</span>" },
      { q: "Pull the latest changes from GitHub", best: "git pull", desc: "Downloads the latest changes from the remote repository", accept: s => has(s,"git") && has(s,"pull"), hint: "The opposite of sending code up.", explain: "<strong>git pull</strong> — downloads the latest changes to your computer.<span class='when'>Use this: at the start of each work session, to make sure you have the latest version.</span>" },
      { q: "See the history of commits", best: "git log", desc: "Shows the timeline of all commits", accept: s => has(s,"git") && has(s,"log"), hint: "Think of a book that records everything that happened in order.", explain: "<strong>git log</strong> — shows all commits: who, when, and the message.<span class='when'>Use this: when you want to see what changed over time, or find a specific past version. Press q to exit.</span>" },
      { q: "Create AND switch to a new branch called 'feature'", best: "git checkout -b feature", desc: "Creates a new branch and switches to it", accept: s => has(s,"git") && hasAny(s,["checkout -b","switch -c"]) && has(s,"feature"), hint: "You need a flag that means 'create new' along with the branch command.", explain: "<strong>git checkout -b feature</strong> — creates a new branch and moves to it.<span class='when'>Use this: when you want to try something without affecting the main version of your project.</span>" },
      { q: "Switch to a branch called 'main'", best: "git checkout main", desc: "Switches to an existing branch", accept: s => has(s,"git") && hasAny(s,["checkout","switch"]) && has(s,"main"), hint: "Same navigation command, just without the 'create' flag.", explain: "<strong>git checkout main</strong> — moves to the 'main' branch.<span class='when'>Use this: when you're done with a feature branch and want to go back to the main version.</span>" },
      { q: "Start a new git project in the current folder", best: "git init", desc: "Initializes a new git repository", accept: s => has(s,"git") && has(s,"init"), hint: "Short for 'initialize' — starting something from scratch.", explain: "<strong>git init</strong> — starts tracking changes in this folder.<span class='when'>Use this: once, at the very beginning of a new project. Or just ask Claude to set it up for you.</span>" },
      { q: "Stage just ONE file called 'index.html' for a commit", best: "git add index.html", desc: "Stages a specific file for the next commit", accept: s => has(s,"git") && has(s,"add") && has(s,"index"), hint: "Same staging command, but name the file instead of using the 'everything' symbol.", explain: "<strong>git add index.html</strong> — pick exactly which files to include.<span class='when'>Use this: when you only want to commit some changes, not everything.</span>" },
      { q: "See what lines changed since your last commit", best: "git diff", desc: "Shows line-by-line changes in your files", accept: s => has(s,"git") && has(s,"diff"), hint: "Short for 'difference' — what's different now vs. before.", explain: "<strong>git diff</strong> — green = added, red = removed.<span class='when'>Use this: to review what Claude (or you) changed before committing.</span>" },
      { q: "What are the 3 steps to save and share your work? (in order)", best: "git add, git commit, git push", desc: "The standard workflow: stage, commit, push", accept: s => has(s,"add") && has(s,"commit") && has(s,"push"), hint: "Pack the box, seal & label it, ship it.", explain: "<strong>add → commit → push</strong>. Pack (add), seal & label (commit), ship (push).<span class='when'>This is THE workflow. You'll do this every time you want to save and share your work.</span>" },
      { q: "Download a project from GitHub for the first time", best: "git clone [URL]", desc: "Downloads an entire repository from GitHub", accept: s => has(s,"git") && has(s,"clone"), hint: "You're making an identical copy — what's another word for that?", explain: "<strong>git clone URL</strong> — downloads the entire project.<span class='when'>Use this: the first time you work on any project from GitHub. Only needed once per project.</span>" },
      { q: "Should you pull or push first when starting work?", best: "Pull first", desc: "Always pull before pushing to get latest changes", accept: s => has(s,"pull"), hint: "You want the freshest version before you add your own changes.", explain: "Always <strong>pull first</strong>! Get the latest, then work, then push.<span class='when'>Make this a habit: every time you sit down to work, start with git pull.</span>" },
      { q: "You forgot to include a file in your last commit. First step?", best: "git status", desc: "Check status to see what was missed", accept: s => has(s,"git") && has(s,"status"), hint: "When something feels wrong, check your dashboard first.", explain: "<strong>git status</strong> — shows the forgotten file as untracked or modified.<span class='when'>Use this: whenever anything feels off. It's your diagnostic tool.</span>" },
    ]

      { q: "Check how much context/memory Claude has left", best: "/context", desc: "Shows context window usage", accept: s => has(s,"/context"), hint: "/ plus the word for Claude's available memory/space.", explain: "<strong>/context</strong> — shows how full Claude's memory is.<span class='when'>Use this: in long sessions. If it's nearly full, use /clear to start fresh.</span>" },

      { q: "You see: 'Permission denied'. What does it mean?", best: "You don't have permission to access that", desc: "Means you're not authorized to do that action", accept: s => hasAny(s,["permission","not allowed","can't access","no access","restricted","not authorized"]), hint: "The system has a lock on it and you don't have the key.", explain: "<strong>Permission denied</strong> — you need higher privileges.<span class='when'>When you see this: try adding <strong>sudo</strong> before the command (it'll ask for your password). Or ask Claude to help.</span>" },
      { q: "What word before a command runs it as admin?", best: "sudo", desc: "Runs commands with administrator privileges", accept: s => has(s,"sudo"), hint: "Stands for 'Super User Do'.", explain: "<strong>sudo</strong> = Super User Do. Asks for your password.<span class='when'>Use this: only when you get 'Permission denied' and you're sure the command is safe. Don't use it casually.</span>" },
      { q: "You typed 'git puhs' and got 'not a git command'. What went wrong?", best: "Typo — should be 'git push'", desc: "A spelling mistake in the command", accept: s => hasAny(s,["typo","spelling","misspell","wrong","push","spelled"]), hint: "Read what you typed very carefully, letter by letter.", explain: "Typo! <strong>puhs</strong> → <strong>push</strong>.<span class='when'>Git is helpful here — it usually suggests the correct command. Read the error message!</span>" },
      { q: "You get 'fatal: not a git repository'. What does it mean?", best: "You're not inside a git project folder", desc: "Means the current folder isn't tracked by git", accept: s => hasAny(s,["not in","not inside","no git","wrong folder","not a git","no repo","haven't init","not initialized"]), hint: "Git is looking for something in this folder and can't find it.", explain: "You're not in a git project. <strong>cd</strong> to the right folder, or <strong>git init</strong> to start one.<span class='when'>When you see this: you probably opened Terminal in the wrong folder. Use cd to navigate to your project.</span>" },
      { q: "What does 'merge conflict' mean in simple terms?", best: "Two changes clash on the same lines — git can't choose", desc: "Two versions changed the same code and git can't auto-merge", accept: s => hasAny(s,["two","both","same","conflict","changed","different","clash","overlap","decide","choose"]), hint: "Imagine two people editing the same sentence differently.", explain: "Two branches changed the same lines differently. Git asks you to choose.<span class='when'>When you see this: don't panic. Ask Claude to help resolve it — it's great at this.</span>" },
      { q: "The terminal shows ':' at the bottom and won't let you type. How do you exit?", best: "Press q", desc: "You're stuck in a pager — press q to quit", accept: s => hasAny(s,["q","quit","press q"]), hint: "Just one letter — the first letter of 'quit'.", explain: "You're in a <strong>pager</strong> (viewer for long output). Press <strong>q</strong> to quit.<span class='when'>This happens after: git log, man pages, or any long output. Just press q and you're free.</span>" },
      { q: "Terminal seems frozen. What should you try first?", best: "Ctrl+C", desc: "Cancel the running process with Ctrl+C", accept: s => hasAll(s,["ctrl","c"]) || hasAll(s,["control","c"]) || has(s,"cancel"), hint: "The universal 'make it stop' shortcut.", explain: "<strong>Ctrl+C</strong> cancels whatever is running.<span class='when'>Try this first EVERY time the terminal seems stuck. It's always safe.</span>" },
      { q: "Ctrl+C didn't unfreeze the terminal. What next?", best: "Ctrl+D or close the terminal window", desc: "Send end-of-input signal or restart the terminal", accept: s => hasAll(s,["ctrl","d"]) || hasAll(s,["control","d"]) || hasAny(s,["close","quit","new tab","reopen"]), hint: "Try another Ctrl shortcut, or the brute force approach.", explain: "<strong>Ctrl+D</strong> or just close the window and open a new one.<span class='when'>When Ctrl+C fails: this is your escalation path. Closing the terminal is always fine — your files are safe.</span>" },
      { q: "You get 'error: failed to push some refs'. What usually fixes it?", best: "git pull first, then push again", desc: "Pull remote changes first, then retry the push", accept: s => has(s,"pull"), hint: "Someone else sent their work up before you did.", explain: "<strong>git pull</strong> first, then <strong>git push</strong> again.<span class='when'>This happens when: GitHub has changes you don't have yet. Pull syncs you up, then push works.</span>" },

      { q: "Clear the terminal screen?", best: "Ctrl+L or clear", desc: "Clears the screen without losing history", accept: s => (hasAll(s,["ctrl","l"]) || hasAll(s,["control","l"]) || has(s,"clear")), hint: "Modifier + L, or type a word that means 'clean up'.", explain: "<strong>Ctrl+L</strong> or type <strong>clear</strong>.<span class='when'>Use this: when the screen is cluttered and you want a clean view. Nothing is lost — just tidied up.</span>" },
      { q: "Delete everything from cursor to END of line?", best: "Ctrl+K", desc: "Kills text from cursor to end of line", accept: s => hasAll(s,["ctrl","k"]) || hasAll(s,["control","k"]), hint: "Modifier + K. K for Kill (cut away).", explain: "<strong>Ctrl+K</strong> — cuts everything after your cursor.<span class='when'>Use this: when you want to change the end of a long command without backspacing forever.</span>" },
      { q: "Delete everything from cursor to BEGINNING of line?", best: "Ctrl+U", desc: "Deletes text from cursor back to line start", accept: s => hasAll(s,["ctrl","u"]) || hasAll(s,["control","u"]), hint: "Modifier + U. Better than holding backspace forever!", explain: "<strong>Ctrl+U</strong> — wipes everything before cursor.<span class='when'>Use this: when you want to start over on a command. Much faster than holding backspace.</span>" },
      { q: "Search through your command history for something you typed before?", best: "Ctrl+R", desc: "Reverse-searches through command history", accept: s => hasAll(s,["ctrl","r"]) || hasAll(s,["control","r"]), hint: "Modifier + R. R for Reverse search.", explain: "<strong>Ctrl+R</strong> — type any part of a previous command and it finds it.<span class='when'>Use this: when you ran a command yesterday and want to find it without scrolling through history.</span>" },
      { q: "Paste text you deleted with Ctrl+K or Ctrl+U?", best: "Ctrl+Y", desc: "Yanks back (pastes) previously deleted text", accept: s => hasAll(s,["ctrl","y"]) || hasAll(s,["control","y"]), hint: "Modifier + Y. Y for Yank (pull back).", explain: "<strong>Ctrl+Y</strong> — pastes back what you cut.<span class='when'>Use this: after Ctrl+K or Ctrl+U if you want that text back somewhere else.</span>" },
      { q: "Run two commands in sequence in one line?", best: "command1 && command2", desc: "Chains commands — second runs only if first succeeds", accept: s => has(s,"&&") || (has(s,"and") && !has(s,"command")), hint: "A double symbol you put between the two commands.", explain: "<strong>&&</strong> chains commands. Second runs only if first succeeds.<span class='when'>Use this: for git workflows like <strong>git add . && git commit -m 'done'</strong> — saves typing two separate commands.</span>" },
      { q: "Re-run the very last command?", best: "Up arrow + Enter, or !!", desc: "Repeats the most recent command", accept: s => hasAny(s,["up","!!","arrow"]), hint: "Either an arrow key, or a double punctuation mark.", explain: "<strong>Up + Enter</strong> is the easy way. <strong>!!</strong> also works.<span class='when'>Use this: when a command failed and you want to retry after fixing something.</span>" },
      { q: "Tab gave you multiple options. How do you see them all?", best: "Press Tab again (double Tab)", desc: "Shows all autocomplete possibilities", accept: s => hasAny(s,["tab again","tab twice","double tab","tab tab","two tab","press tab"]), hint: "Just press the same key one more time.", explain: "<strong>Tab twice</strong> — shows all possible matches.<span class='when'>Use this: when Tab doesn't complete because there are multiple files starting with the same letters.</span>" },
      { q: "Open a new terminal tab (macOS)", best: "Cmd+T", desc: "Opens a new terminal tab", accept: s => hasAny(s,["cmd+t","cmd t","command+t","command t"]), hint: "Same shortcut as opening a new tab in your browser.", explain: "<strong>Cmd+T</strong> — new tab, just like in a browser.<span class='when'>Use this: when you need to do something in the terminal while Claude is still working in another tab.</span>" },
      { q: "What does the Up arrow do in the terminal?", best: "Shows previous commands from history", desc: "Cycles through previously typed commands", accept: s => hasAny(s,["previous","last","history","before","earlier","past","repeat"]), hint: "It goes backwards through everything you've typed.", explain: "<strong>Up arrow</strong> cycles through command history.<span class='when'>Pro tip: experienced users barely type anything new — they mostly recall and edit previous commands.</span>" },
      { q: "Tab does nothing when you press it. Why?", best: "No match, or too many matches — type more characters", desc: "No unique match found for autocomplete", accept: s => hasAny(s,["no match","too many","type more","more characters","more letter","multiple","nothing match","ambiguous"]), hint: "The terminal needs more information to narrow it down.", explain: "Either nothing matches or too many things do. Type a few more characters, Tab again.<span class='when'>When this happens: press Tab twice to see all options, then type enough letters to be unique.</span>" },
    ]
  }
};

// ═══════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════

function norm(s) { return s.toLowerCase().replace(/['"]/g,"").replace(/\s+/g," ").trim(); }
function has(input, word) { return norm(input).includes(norm(word)); }
function hasAny(input, words) { return words.some(w => has(input, w)); }
function hasAll(input, words) { return words.every(w => has(input, w)); }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function getAllQuestions() {
  let all = [];
  Object.entries(DRILLS).forEach(([cat, d]) => {
    d.questions.forEach((q, i) => all.push({ ...q, id: cat+"_"+i, cat }));
  });
  return all;
}

function getDistractors(item, count) {
  const all = getAllQuestions().filter(q => q.id !== item.id && q.best !== item.best);
  return shuffle(all).slice(0, count).map(q => q.best);
}

function getDescDistractors(item, count) {
  const all = getAllQuestions().filter(q => q.id !== item.id && q.desc !== item.desc);
  return shuffle(all).slice(0, count).map(q => q.desc);
}

function pickFormat(item) {
  const r = Math.random();
  if (r < 0.30) return "type";
  if (r < 0.60) return "choice";
  if (r < 0.80) return "tf";
  return "reverse";
}

// ═══════════════════════════════════════════
//  STATE & RENDERING
// ═══════════════════════════════════════════

let state = {};
const body = document.getElementById("body");
const scorebar = document.getElementById("scorebar");
function render(html) { body.innerHTML = html; }
function scrollBottom() { body.scrollTop = body.scrollHeight; }

function showMenu() {
  state = {
    queue: [], current: 0, answered: 0, firstTryCorrect: 0,
    streak: 0, bestStreak: 0, history: [], wrongMap: new Map(),
    originalCount: 0, waitingForUser: false
  };
  scorebar.style.display = "none";

  let html = `
    <div class="line bold heading">Terminal & Claude Code Drills</div>
    <div class="line dim">4 question types. Shuffled every time. Wrong answers come back.</div>
    <div class="line" style="margin-top:16px; color:#8b949e;">Pick a category:</div>
    <div class="categories">
  `;

  const cats = Object.keys(DRILLS);
  cats.forEach((key, i) => {
    const d = DRILLS[key];
    html += `
      <button class="cat-btn" onclick="startDrill('${key}')">
        <span class="cat-num">${i + 1}</span>${d.title}
        <span class="cat-desc">${d.desc} — ${d.questions.length} questions</span>
      </button>`;
  });

  html += `
      <button class="cat-btn" onclick="startMixed()" style="grid-column: 1 / -1;">
        <span class="cat-num">${cats.length + 1}</span>Mixed Drill
        <span class="cat-desc">Random from all categories — 15 questions</span>
      </button>
    </div>`;

  render(html);
}

function startDrill(cat) {
  const questions = shuffle(DRILLS[cat].questions.map((q, i) => ({ ...q, id: cat+"_"+i, cat })));
  initDrill(questions);
}

function startMixed() {
  initDrill(shuffle(getAllQuestions()).slice(0, 15));
}

function initDrill(questions) {
  state.queue = questions.map(q => ({ ...q, format: pickFormat(q), isRetry: false }));
  state.originalCount = questions.length;
  state.current = 0;
  state.answered = 0;
  state.firstTryCorrect = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.history = [];
  state.wrongMap = new Map();
  state.waitingForUser = false;
  showQuestion();
}

function showQuestion() {
  if (state.waitingForUser) return;
  const item = state.queue[state.current];
  const remaining = state.queue.length - state.current;

  scorebar.style.display = "flex";
  document.getElementById("scoreNum").textContent = `${state.firstTryCorrect}/${state.answered}`;
  document.getElementById("streakText").textContent = state.streak > 1 ? `Streak: ${state.streak}` : "";
  updatePips();

  const retryLabel = item.isRetry ? `<span class="retry-badge">RETRY</span>` : "";
  const fmtLabels = { type: "TYPE IT", choice: "PICK ONE", tf: "TRUE / FALSE", reverse: "WHAT DOES IT DO?" };
  const fmtClass = { type: "type", choice: "choice", tf: "tf", reverse: "reverse" };

  let html = `<div class="line dim">Question ${state.history.length + 1}${retryLabel} <span class="format-tag ${fmtClass[item.format]}">${fmtLabels[item.format]}</span></div>`;

  if (item.format === "type") html += renderType(item);
  else if (item.format === "choice") html += renderChoice(item);
  else if (item.format === "tf") html += renderTF(item);
  else html += renderReverse(item);

  render(html);
  const input = document.getElementById("input");
  if (input) { input.focus(); input.addEventListener("keydown", e => { if (e.key === "Enter") submitType(); }); }
  scrollBottom();
}

function renderType(item) {
  return `
    <div class="line heading" style="margin:8px 0 12px">${item.q}</div>
    <div id="hint-area"><button class="hint-btn" onclick="showHint()">hint</button></div>
    <div id="feedback-area"></div>
    <div class="input-row"><span class="prompt-symbol">$</span>
      <input type="text" id="input" placeholder="type your answer..." autocomplete="off" autofocus spellcheck="false">
    </div><div id="action-area"></div>`;
}

function submitType() {
  const input = document.getElementById("input");
  if (!input || input.disabled) return;
  const val = input.value.trim();
  if (!val) return;
  input.disabled = true; input.style.opacity = 0.5;
  handleResult(state.queue[state.current].accept(val), state.queue[state.current]);
}

function renderChoice(item) {
  const options = shuffle([item.best, ...getDistractors(item, 3)]);
  state._choiceAnswer = item.best;
  state._choiceOptions = options;
  const keys = ["A","B","C","D"];
  let c = `<div class="choices" id="choices">`;
  options.forEach((opt, i) => {
    c += `<button class="choice-btn" data-idx="${i}" onclick="submitChoice(${i})"><span class="choice-key">${keys[i]}</span>${opt}</button>`;
  });
  return `<div class="line heading" style="margin:8px 0 12px">${item.q}</div>
    <div id="hint-area"><button class="hint-btn" onclick="showHint()">hint</button></div>
    ${c}</div><div id="feedback-area"></div><div id="action-area"></div>`;
}

function submitChoice(idx) {
  const btns = document.querySelectorAll(".choice-btn");
  if ([...btns].some(b => b.classList.contains("correct") || b.classList.contains("wrong"))) return;
  const correct = state._choiceOptions[idx] === state._choiceAnswer;
  btns.forEach((btn, i) => {
    btn.style.pointerEvents = "none";
    if (i === idx) btn.classList.add(correct ? "correct" : "wrong");
    if (!correct && state._choiceOptions[i] === state._choiceAnswer) btn.classList.add("reveal");
  });
  handleResult(correct, state.queue[state.current]);
}

function renderTF(item) {
  const isTrue = Math.random() < 0.5;
  const shownDesc = isTrue ? item.desc : pick(getAllQuestions().filter(q => q.id !== item.id && q.desc !== item.desc)).desc;
  state._tfCorrectAnswer = isTrue;
  return `<div class="line heading" style="margin:8px 0 8px">Is this statement correct?</div>
    <div class="tf-statement"><span class="tf-cmd">${item.best}</span><span class="tf-arrow">→</span>${shownDesc}</div>
    <div id="hint-area"><button class="hint-btn" onclick="showHint()">hint</button></div>
    <div class="tf-buttons" id="tf-buttons">
      <button class="tf-btn true-btn" onclick="submitTF(true)">TRUE</button>
      <button class="tf-btn false-btn" onclick="submitTF(false)">FALSE</button>
    </div><div id="feedback-area"></div><div id="action-area"></div>`;
}

function submitTF(answer) {
  const btns = document.querySelectorAll(".tf-btn");
  if ([...btns].some(b => b.classList.contains("dimmed"))) return;
  const correct = answer === state._tfCorrectAnswer;
  btns.forEach(btn => {
    btn.style.pointerEvents = "none";
    const isSelected = (btn.classList.contains("true-btn") && answer) || (btn.classList.contains("false-btn") && !answer);
    btn.classList.add(isSelected ? "selected" : "dimmed");
  });
  handleResult(correct, state.queue[state.current]);
}

function renderReverse(item) {
  const options = shuffle([item.desc, ...getDescDistractors(item, 3)]);
  state._reverseAnswer = item.desc;
  state._reverseOptions = options;
  const keys = ["A","B","C","D"];
  let c = `<div class="choices" id="choices">`;
  options.forEach((opt, i) => {
    c += `<button class="choice-btn" data-idx="${i}" onclick="submitReverse(${i})"><span class="choice-key">${keys[i]}</span>${opt}</button>`;
  });
  return `<div class="line heading" style="margin:8px 0 8px">What does this command do?</div>
    <div class="reverse-cmd"><code>${item.best}</code></div>
    <div id="hint-area"><button class="hint-btn" onclick="showHint()">hint</button></div>
    ${c}</div><div id="feedback-area"></div><div id="action-area"></div>`;
}

function submitReverse(idx) {
  const btns = document.querySelectorAll(".choice-btn");
  if ([...btns].some(b => b.classList.contains("correct") || b.classList.contains("wrong"))) return;
  const correct = state._reverseOptions[idx] === state._reverseAnswer;
  btns.forEach((btn, i) => {
    btn.style.pointerEvents = "none";
    if (i === idx) btn.classList.add(correct ? "correct" : "wrong");
    if (!correct && state._reverseOptions[i] === state._reverseAnswer) btn.classList.add("reveal");
  });
  handleResult(correct, state.queue[state.current]);
}

// ═══════════════════════════════════════════
//  RESULT HANDLER
// ═══════════════════════════════════════════

function handleResult(correct, item) {
  state.answered++;
  state.history.push({ q: item.q, best: item.best, correct, isRetry: item.isRetry });

  if (correct) {
    if (!item.isRetry) state.firstTryCorrect++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
  } else {
    state.streak = 0;
    state.wrongMap.set(item.id, (state.wrongMap.get(item.id) || 0) + 1);
    const newFmt = pick(["type","choice","tf","reverse"].filter(f => f !== item.format));
    const insertAt = Math.min(state.current + 2 + Math.floor(Math.random() * 2), state.queue.length);
    state.queue.splice(insertAt, 0, { ...item, format: newFmt, isRetry: true });
  }

  document.getElementById("scoreNum").textContent = `${state.firstTryCorrect}/${state.answered}`;
  document.getElementById("streakText").textContent = state.streak > 1 ? `Streak: ${state.streak}` : "";
  updatePips();

  const fb = document.getElementById("feedback-area");
  const actions = document.getElementById("action-area");

  if (correct) {
    fb.innerHTML = `<div class="line green" style="margin:8px 0">  ✓ Correct!</div>`;
    actions.innerHTML = `<div class="action-row"><button class="btn" onclick="nextQuestion()">Got it →</button></div>`;
  } else {
    fb.innerHTML = `
      <div class="line red" style="margin:4px 0">  ✗ The answer is: <span style="color:#3fb950;font-weight:600">${item.best}</span></div>
      <div class="explain">${item.explain}</div>
      <div class="line dim" style="font-size:12px;margin-top:4px">  ↻ This will come back in a different format</div>`;
    actions.innerHTML = `<div class="action-row">
      <button class="btn" onclick="nextQuestion()">Got it →</button>
      <button class="btn drill-more" onclick="drillMoreOnThis()">Drill me more on this</button>
    </div>`;
  }

  state.waitingForUser = true;
  scrollBottom();
}

function nextQuestion() {
  state.waitingForUser = false;
  state.current++;
  state.current < state.queue.length ? showQuestion() : showResults();
}

function drillMoreOnThis() {
  const item = state.queue[state.current];
  const usedFmts = [item.format];
  const allFmts = ["type","choice","tf","reverse"];
  for (let i = 0; i < 2; i++) {
    const avail = allFmts.filter(f => !usedFmts.includes(f));
    const fmt = avail.length > 0 ? pick(avail) : pick(allFmts);
    usedFmts.push(fmt);
    const at = Math.min(state.current + 2 + i + Math.floor(Math.random() * 2), state.queue.length);
    state.queue.splice(at, 0, { ...item, format: fmt, isRetry: true });
  }
  const btn = document.querySelector(".btn.drill-more");
  if (btn) { btn.textContent = "Added! ✓"; btn.style.pointerEvents = "none"; btn.style.opacity = "0.5"; }
  scrollBottom();
}

function showHint() {
  const item = state.queue[state.current];
  document.getElementById("hint-area").innerHTML = `<div class="hint-text">💡 ${item.hint}</div>`;
  const input = document.getElementById("input");
  if (input) input.focus();
}

function updatePips() {
  const remaining = state.queue.length - state.current;
  let html = "";
  state.history.forEach(h => { html += `<div class="pip ${h.correct ? 'correct' : (h.isRetry ? 'retry' : 'wrong')}"></div>`; });
  if (remaining > 0) html += `<div class="pip current"></div>`;
  for (let i = 1; i < remaining; i++) html += `<div class="pip"></div>`;
  document.getElementById("pips").innerHTML = html;
}

function showResults() {
  scorebar.style.display = "none";
  const total = state.originalCount;
  const pct = Math.round(state.firstTryCorrect / total * 100);
  let msg, color;
  if (pct === 100) { msg = "Perfect on the first try!"; color = "#3fb950"; }
  else if (pct >= 80) { msg = "Almost perfect! Great job."; color = "#3fb950"; }
  else if (pct >= 50) { msg = "Good progress. Keep drilling!"; color = "#d29922"; }
  else { msg = "You're learning — run it again!"; color = "#f85149"; }

  let html = `<div class="result-card">
    <div class="big-score" style="color:${color}">${state.firstTryCorrect}/${total}</div>
    <div class="pct">${pct}% first-try accuracy</div>
    <div class="msg">${msg}</div>
    ${state.bestStreak > 1 ? `<div class="msg" style="color:#d29922">Best streak: ${state.bestStreak} in a row</div>` : ""}
    ${state.wrongMap.size > 0 ? `<div class="msg dim">Retried ${state.wrongMap.size} question${state.wrongMap.size>1?'s':''} until correct</div>` : ""}
  </div>`;

  if (state.wrongMap.size > 0) {
    html += `<div class="line dim" style="margin-bottom:6px">Needed extra practice:</div><div class="review-list">`;
    const seen = new Set();
    state.history.forEach(h => {
      if (!h.correct && !seen.has(h.q)) {
        seen.add(h.q);
        html += `<div class="review-item"><span class="q">${h.q}</span><br><span class="a">${h.best}</span></div>`;
      }
    });
    html += `</div>`;
  }

  html += `<div style="text-align:center;margin-top:16px">
    <button class="btn" onclick="showMenu()">Play Again</button></div>`;
  render(html);
  scrollBottom();
}

document.addEventListener("keydown", e => {
  if (state.waitingForUser && e.key === "Enter") { nextQuestion(); return; }
  const item = state.queue?.[state.current];
  if (!item || state.waitingForUser) return;
  if (item.format === "choice" || item.format === "reverse") {
    const map = {a:0,b:1,c:2,d:3,"1":0,"2":1,"3":2,"4":3};
    if (map[e.key.toLowerCase()] !== undefined) {
      item.format === "choice" ? submitChoice(map[e.key.toLowerCase()]) : submitReverse(map[e.key.toLowerCase()]);
    }
  }
  if (item.format === "tf") {
    if (e.key.toLowerCase()==="t"||e.key==="1") submitTF(true);
    if (e.key.toLowerCase()==="f"||e.key==="2") submitTF(false);
  }
});

showMenu();
</script>
